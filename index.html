<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="theme-color" content="#16232F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LIFE TREE">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#16232F;--navy-2:#1F3040;--paper:#F3F5F4;--card:#FFFFFF;--line:#DBE1E2;--ink:#1B2530;--muted:#748089;
    --amber:#1FB6C9;--amber-deep:#0E8B9B;--danger:#D2503C;--danger-bg:#FBEAE6;--ok:#3E8E63;--ok-bg:#E7F3EB;
    --violet:#6A4A8A;--violet-bg:#F1E7F5;--teal:#2E7D74;--teal-bg:#E4F1EF;--radius:10px;
  }
  *{box-sizing:border-box;}
  #ss-root button{touch-action:manipulation;}
  #ss-root{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);min-height:100%;padding:0;font-size:14px;line-height:1.5;}
  #ss-root .mono{font-family:'Inter',sans-serif;}
  #ss-root h1,#ss-root h2,#ss-root h3,#ss-root .disp{font-family:'Barlow Condensed',sans-serif;letter-spacing:.02em;}
  .ss-header{
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 28px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 28px),
      linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
    color:#EFF3F5;padding:22px 24px 0 24px;border-bottom:3px solid var(--amber);
  }
  .ss-header-top{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .ss-title{font-size:26px;font-weight:700;text-transform:uppercase;margin:0;}
  .ss-title span{color:var(--amber);}
  .ss-sub{font-size:12px;color:#B9C4CB;font-family:'Inter',sans-serif;letter-spacing:.03em;}
  .ss-tabs{display:flex;gap:2px;overflow-x:auto;}
  .ss-tab{padding:10px 16px;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:14.5px;color:#C3CDD3;background:transparent;border:none;cursor:pointer;border-radius:8px 8px 0 0;white-space:nowrap;letter-spacing:.03em;}
  .ss-tab.active{background:var(--paper);color:var(--navy);}
  .ss-tab:not(.active):hover{background:rgba(255,255,255,0.08);color:#fff;}
  @media(min-width:641px){
    .ss-header{display:flex;align-items:center;gap:28px;padding:14px 24px;}
    .ss-header-top{margin-bottom:0;flex:0 0 auto;}
    .ss-tabs{flex:1;}
    .ss-tab{padding:8px 16px;}
  }
  .ss-main{padding:22px 24px 60px 24px;}
  .ss-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:18px;}
  .ss-card-title{font-size:13px;text-transform:uppercase;color:var(--muted);font-weight:600;letter-spacing:.08em;margin:0 0 14px 0;padding-bottom:8px;border-bottom:1px dashed var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  .ss-card-title small{font-family:'Inter',sans-serif;text-transform:none;letter-spacing:0;font-size:11.5px;color:var(--muted);}
  .ss-subhead{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13.5px;color:var(--navy);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.04em;}
  .ss-grid{display:grid;gap:14px;}
  .ss-grid.cols-3{grid-template-columns:repeat(3,1fr);}
  .ss-grid.cols-4{grid-template-columns:repeat(4,1fr);}
  @media(max-width:800px){.ss-grid.cols-3,.ss-grid.cols-4{grid-template-columns:1fr 1fr;}}
  @media(max-width:520px){.ss-grid.cols-3,.ss-grid.cols-4{grid-template-columns:1fr;}}
  .ss-stat{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:12px 14px;}
  .ss-stat b{display:block;font-family:'Inter',sans-serif;font-size:20px;color:var(--navy);}
  .ss-stat span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
  .ss-alert{display:flex;align-items:center;gap:10px;background:var(--danger-bg);color:#8A2F1F;border:1px solid #EFC3B8;border-radius:8px;padding:9px 13px;margin-bottom:8px;font-size:13px;}
  .ss-alert b{font-family:'Inter',sans-serif;}
  .ss-empty{color:var(--muted);font-size:13px;padding:14px 4px;}
  input[type=text],input[type=number],input[type=date],input[type=time],select,textarea{font-family:'Inter',sans-serif;border:1px solid var(--line);border-radius:6px;padding:7px 9px;font-size:13px;background:#fff;color:var(--ink);width:100%;}
  textarea{resize:vertical;min-height:60px;font-family:'Inter',sans-serif;font-size:13px;}
  label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;}
  .ss-field{margin-bottom:10px;}
  .ss-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .ss-row > *{flex:1;min-width:120px;}
  button.ss-btn{font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.03em;background:var(--navy);color:#fff;border:none;border-radius:7px;padding:9px 18px;font-size:15px;cursor:pointer;}
  button.ss-btn:hover{background:var(--navy-2);}
  button.ss-btn.amber{background:var(--amber);color:var(--navy);}
  button.ss-btn.amber:hover{background:var(--amber-deep);color:#fff;}
  button.ss-btn.violet{background:var(--violet);color:#fff;}
  button.ss-btn.violet:hover{background:#553870;}
  button.ss-btn.teal{background:var(--teal);color:#fff;}
  button.ss-btn.teal:hover{background:#245F58;}
  button.ss-btn.danger{background:var(--danger);color:#fff;}
  button.ss-btn.danger:hover{background:#A83A29;}
  button.ss-btn.ghost{background:transparent;color:var(--navy);border:1px solid var(--line);}
  button.ss-btn.ghost:hover{background:var(--paper);}
  button.ss-btn.small{padding:5px 10px;font-size:12px;border-radius:5px;}
  button.ss-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 6px;}
  button.ss-x:hover{color:var(--danger);}
  table.ss-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.ss-table th{text-align:left;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;font-size:11px;color:var(--muted);letter-spacing:.05em;padding:6px 8px;border-bottom:1px solid var(--line);}
  table.ss-table td{padding:7px 8px;border-bottom:1px solid #EEF1F1;vertical-align:top;}
  .ss-table-wrap{overflow-x:auto;}
  .ss-table select,.ss-table input{width:auto;min-width:80px;}
  .ss-drag-handle{cursor:grab;touch-action:none;-webkit-user-select:none;user-select:none;color:var(--muted);text-align:center;font-size:16px;}
  .ss-pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .ss-pill.emp{background:#E4EAF3;color:#2A4A7A;}
  .ss-pill.out{background:#F1E7F5;color:#6A3A82;}
  .ss-badge{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;border:2px solid var(--navy);font-family:'Inter',sans-serif;font-weight:700;font-size:12px;color:var(--navy);flex-shrink:0;}
  .ss-badge.warn{border-color:var(--danger);color:var(--danger);}
  .ss-cand{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px dashed var(--line);}
  .ss-cand:last-child{border-bottom:none;}
  .ss-cand .name{font-weight:600;flex:1;}
  .ss-cand .meta{font-size:11px;color:var(--muted);font-family:'Inter',sans-serif;}
  .ss-bar{height:6px;border-radius:3px;background:#EDEFEF;overflow:hidden;width:70px;flex-shrink:0;}
  .ss-bar i{display:block;height:100%;background:var(--ok);}
  .ss-bar i.warn{background:var(--danger);}
  .ss-shortage{background:#E3F6F8;border:1px solid #B8E4E9;border-radius:8px;padding:10px 13px;font-size:13px;color:#0E6B78;margin-top:8px;}
  .ss-cal-toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
  .ss-cal-layout{display:flex;gap:16px;align-items:stretch;height:calc(100vh - 172px);}
  .ss-cal-main{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0;}
  .ss-cal-side{width:300px;flex-shrink:0;height:100%;overflow-y:auto;}
  .ss-cal-side-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .ss-cal-side-head h3{margin:0;font-size:17px;flex:1;}
  .ss-cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:2px;flex-shrink:0;}
  .ss-cal-card{display:flex;flex-direction:column;flex:1;min-height:0;}
  .ss-cal-swipearea{overflow:hidden;flex:1;min-height:0;}
  .ss-cal-track{display:flex;width:300%;height:100%;transform:translateX(-33.3333%);}
  .ss-cal-track.dragging{transition:none;}
  .ss-cal-track:not(.dragging){transition:transform 0.24s ease-out;}
  .ss-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(40px,1fr);gap:4px;width:33.3333%;height:100%;flex-shrink:0;}
  .ss-cal-dow{font-size:11px;text-align:center;color:var(--muted);text-transform:uppercase;font-weight:600;padding-bottom:4px;}
  .ss-cal-cell{min-height:0;border:1px solid var(--line);border-radius:6px;padding:4px;font-size:11px;background:#fff;cursor:pointer;overflow:hidden;}
  .ss-cal-cell:hover{border-color:var(--amber);}
  .ss-cal-cell.today{border-color:var(--amber);border-width:2px;}
  .ss-cal-cell.other-month{opacity:.4;}
  .ss-cal-cell.selected{background:var(--paper);box-shadow:inset 0 0 0 2px var(--navy);}
  .ss-cal-cell .d{font-family:'Inter',sans-serif;color:var(--muted);margin-bottom:3px;}
  .ss-cal-cell .d.sat{color:#2F6FDE;}
  .ss-cal-cell .d.sun{color:#D2503C;}
  .ss-cal-item{border-radius:3px;padding:0 4px;margin-bottom:1px;font-size:10px;line-height:1.6;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ss-cal-more{font-size:10px;color:var(--muted);font-weight:600;padding:0 4px;line-height:1.6;}
  .ss-taskchip{display:inline-flex;align-items:center;gap:6px;background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:3px 10px 3px 6px;font-size:12px;margin:2px;cursor:pointer;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  .ss-taskchip.dragging{opacity:.45;box-shadow:0 4px 10px rgba(0,0,0,.2);}
  .ss-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .ss-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:99;box-shadow:0 4px 14px rgba(0,0,0,.2);}
  .ss-outsource-row{background:var(--violet-bg);border-radius:8px;padding:10px 12px;margin-top:6px;}
  .ss-vendor-tag{display:inline-block;background:var(--violet-bg);color:var(--violet);border-radius:5px;padding:2px 7px;font-size:11px;margin:2px 3px 2px 0;}
  .ss-import-box{background:var(--paper);border:1px dashed var(--line);border-radius:8px;padding:12px 14px;}
  .ss-hint{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.6;}
  .ss-worker-card{border:1px solid var(--line);border-radius:9px;padding:12px 14px;margin-bottom:10px;background:var(--paper);}
  .ss-worker-card .top{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px;}
  .ss-worker-card .top .wname{font-weight:700;font-size:15px;flex:1;min-width:100px;}
  .ss-skillchip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:3px 6px 3px 10px;font-size:12px;margin:2px;}
  .ss-skillchip .lv{background:var(--navy);color:#fff;border-radius:10px;padding:2px 8px;display:inline-flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;white-space:nowrap;}
  .ss-add-skill-form{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:6px;background:#fff;border:1px dashed var(--line);border-radius:7px;padding:8px;}
  .ss-add-skill-form select,.ss-add-skill-form input{width:auto;min-width:90px;flex:1;}
  .ss-chiptoggle{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);background:#fff;border-radius:20px;padding:4px 12px;font-size:12px;margin:2px;cursor:pointer;user-select:none;}
  .ss-chiptoggle.on{background:var(--navy);color:#fff;border-color:var(--navy);}
  .ss-skill-group{margin:2px 0;}
  .ss-skill-group-head{display:flex;align-items:center;gap:6px;padding:5px 4px;cursor:pointer;user-select:none;border-radius:6px;}
  .ss-skill-group-head:hover{background:var(--paper);}
  .ss-skill-caret{color:var(--muted);font-size:10px;width:10px;display:inline-block;}
  .ss-skill-eqname{font-weight:600;font-size:13px;flex:1;}
  .ss-skill-count{font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;}
  .ss-skill-group-body{padding-left:18px;}
  .ss-chat-wrap{display:flex;flex-direction:column;height:520px;}
  .ss-chat-log{flex:1;overflow-y:auto;padding:6px 2px;display:flex;flex-direction:column;gap:10px;}
  .ss-msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:13.5px;line-height:1.6;}
  .ss-msg.user{align-self:flex-end;background:var(--navy);color:#fff;border-bottom-right-radius:3px;}
  .ss-msg.ai{align-self:flex-start;background:var(--paper);border:1px solid var(--line);border-bottom-left-radius:3px;}
  .ss-msg.system{align-self:center;background:transparent;color:var(--muted);font-size:11.5px;}
  .ss-chat-input-row{display:flex;gap:8px;margin-top:10px;}
  .ss-chat-input-row input{flex:1;}
  .ss-chat-input-row textarea{flex:1;resize:none;min-height:38px;max-height:140px;line-height:1.4;}
  .ss-proposal-card{background:#fff;border:1px solid var(--amber);border-radius:10px;padding:12px 14px;align-self:flex-start;max-width:92%;}
  .ss-proposal-card .ptitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--navy);margin-bottom:6px;}
  .ss-typing{align-self:flex-start;color:var(--muted);font-size:12px;padding:4px 8px;}
  .ss-quickreplies{align-self:flex-start;display:flex;flex-wrap:wrap;gap:4px;max-width:90%;margin-top:-4px;}
  .ss-quickreplies .ss-chiptoggle{background:#fff;border-color:var(--teal);color:var(--teal);}
  .ss-cal-legend{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .ss-cal-legend-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;}
  .ss-cal-add-btn{width:27px;height:27px;border-radius:50%;border:1px dashed var(--line);background:#fff;color:var(--muted);font-size:16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;line-height:1;}
  .ss-cal-add-btn:hover{border-color:var(--amber);color:var(--amber-deep);border-style:solid;}
  .ss-cal-label-btn{background:none;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;color:var(--ink);padding:2px 4px;border-radius:6px;}
  .ss-cal-label-btn:hover{background:var(--paper);}
  .ss-month-picker{position:absolute;top:36px;left:0;background:#fff;border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.22);padding:12px;z-index:20;width:230px;}
  .ss-month-picker select{margin-bottom:8px;}
  .ss-month-picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .ss-month-picker-btn{padding:8px 0;border:1px solid var(--line);border-radius:6px;background:#fff;cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;}
  .ss-month-picker-btn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
  .ss-desktop-nav button{background:none;border:none;color:var(--navy);font-size:20px;cursor:pointer;padding:4px 8px;line-height:1;}
  .ss-desktop-nav button:hover{color:var(--amber-deep);}
  .ss-cal-legend-item{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:20px;padding:4px 10px 4px 6px;font-size:12px;cursor:pointer;background:#fff;}
  .ss-cal-legend-item.off{opacity:.35;}
  .ss-modal-overlay{position:fixed;inset:0;background:rgba(20,30,40,0.55);display:flex;align-items:flex-start;justify-content:center;padding:30px 14px;overflow-y:auto;z-index:200;}
  .ss-modal{background:#fff;border-radius:12px;max-width:540px;width:100%;padding:20px 22px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
  .ss-modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .ss-modal-head h3{margin:0;font-size:19px;font-family:'Barlow Condensed',sans-serif;}
  .ss-modal-section{padding:10px 0;border-bottom:1px dashed var(--line);}
  .ss-modal-section:last-child{border-bottom:none;}
  .ss-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;}
  .ss-title-input{border:none;background:transparent;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;padding:6px 0;color:var(--ink);width:100%;border-bottom:2px solid transparent;}
  .ss-title-input:focus{outline:none;border-bottom-color:var(--amber);}
  .ss-color-summary{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 0;}
  .ss-color-summary .ic{font-size:16px;}
  .ss-color-summary .ss-dot{width:14px;height:14px;}
  .ss-color-summary .chev{margin-left:auto;color:var(--muted);font-size:16px;}
  .ss-datetime-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .ss-datetime-row label{width:40px;flex-shrink:0;margin-bottom:0;}
  .ss-datetime-row input{flex:1;min-width:0;}
  .ss-switch{width:40px;height:22px;border-radius:20px;background:#DADFE1;position:relative;cursor:pointer;flex-shrink:0;}
  .ss-switch.on{background:var(--ok);}
  .ss-switch .knob{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .15s;}
  .ss-switch.on .knob{left:20px;}
  .ss-modal-actions{display:flex;justify-content:space-between;margin-top:14px;gap:8px;}
  .ss-color-swatch{width:22px;height:22px;border-radius:50%;display:inline-block;cursor:pointer;border:2px solid transparent;margin:2px;}
  .ss-color-swatch.on{border-color:var(--ink);}
  details.ss-details summary{cursor:pointer;font-size:12.5px;color:var(--navy);font-weight:600;padding:6px 0;}
  .ss-link-btn{display:inline-flex;align-items:center;gap:5px;background:var(--teal-bg);color:var(--teal);border:1px solid #BFE0DB;border-radius:6px;padding:6px 10px;font-size:12.5px;text-decoration:none;cursor:pointer;}
  .ss-daylist-item{display:flex;align-items:center;gap:10px;padding:10px 6px;border-bottom:1px dashed var(--line);cursor:pointer;}
  .ss-daylist-item:last-child{border-bottom:none;}
  .ss-daylist-item:hover{background:var(--paper);}
  .ss-image-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:8px;}
  .ss-image-thumb{position:relative;width:100%;aspect-ratio:16/10;border-radius:8px;overflow:hidden;border:1px solid var(--line);background:var(--paper);}
  .ss-image-thumb img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;}
  .ss-image-thumb .ss-x{position:absolute;top:2px;right:2px;background:rgba(20,30,40,.6);color:#fff;border-radius:50%;width:20px;height:20px;padding:0;line-height:20px;font-size:13px;}
  .ss-image-thumb .ss-x:hover{color:#fff;background:var(--danger);}
  .ss-image-loading{display:flex;align-items:center;justify-content:center;height:100%;font-size:10px;color:var(--muted);text-align:center;}
  .ss-daylist-swipearea{touch-action:pan-y;}
  .ss-cal-swipearea{touch-action:pan-y;}
  .ss-detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:16px;}
  .ss-detail-back{background:none;border:none;color:var(--navy);font-size:22px;cursor:pointer;padding:2px 6px;flex-shrink:0;}
  .ss-detail-menu-btn{background:none;border:none;color:var(--navy);font-size:22px;cursor:pointer;padding:2px 10px;flex-shrink:0;position:relative;}
  .ss-detail-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;line-height:1.35;margin-bottom:14px;}
  .ss-detail-datebox{margin-bottom:18px;}
  .ss-detail-date-line{font-size:13px;color:var(--muted);margin-bottom:6px;}

<script>
(function(){
  const COLORS = ['#3E6E9E','#B87A1E','#5E8E5A','#8A5AA0','#C05C5C','#3A9E92','#9E7A3A'];
  const CAL_COLORS = ['#3E6E9E','#B87A1E','#5E8E5A','#8A5AA0','#C05C5C','#2E7D74','#9E7A3A','#4A5568'];
  const EVENT_COLORS = [
    {name:'エメラルド・グリーン', hex:'#00A86B'},
    {name:'モダーン・サイアン', hex:'#00BCD4'},
    {name:'ディープ・スカイブルー', hex:'#1E88E5'},
    {name:'パステル・ブラウン', hex:'#A1887F'},
    {name:'ミッドナイト・ブラック', hex:'#2C2C34'},
    {name:'アップル・レッド', hex:'#E53935'},
    {name:'フレンチ・ローズ', hex:'#E0356B'},
    {name:'コーラル・ピンク', hex:'#FF8A80'},
    {name:'ブライト・オレンジ', hex:'#FB8C00'},
    {name:'ソフト・バイオレット', hex:'#9575CD'},
  ];
  const WORK_DURATION_RULES = {
    '新規設置': {duration:1, unit:'時間', count:2},
    '搬出撤去': {duration:1, unit:'時間', count:2},
    '廃棄': {duration:1, unit:'時間', count:2},
    '棚取り付け': {duration:1, unit:'時間', count:2},
    'その他残工事': {duration:1, unit:'時間', count:2},
    '入替え': {duration:2, unit:'時間', count:2},
    '修理': {duration:1, unit:'時間', count:1},
    '給排水工事': {duration:1, unit:'時間', count:1},
    '電気工事': {duration:1, unit:'時間', count:1},
    'シンク穴開け': {duration:1, unit:'時間', count:1},
    '板金加工': {duration:1, unit:'時間', count:1},
    'コーキング': {duration:1, unit:'時間', count:1},
  };
  const STANDALONE_WORK_TYPES = ['修理','給排水工事','電気工事','シンク穴開け','板金加工','コーキング','棚取り付け'];
  let state = { equipmentTypes: [], workTypes: [], specialWorks: [], workers: [], vendors: [], disposalSites: [], projects: [], templates: [], calendars: [] };
  let tab = 'calendar';
  let calMonth = new Date(); calMonth.setDate(1);
  let calVisible = {}; // calendarId -> bool
  let eventModal = null; // {mode:'new'|'edit', data:{...}, id?, originalImageKeys?}
  let dayListModal = null; // dateStr
  let detailModal = null; // projectId
  let detailMenuOpen = false;
  let copyModal = null; // {projectId, date, calendarId}
  let imageViewer = null; // dataUrl
  let recurringModal = null; // {title, calendarId, weekdays:{0..6:bool}, includeHolidays, startDate, endDate}
  let calSelectedDate = null;
  let monthPickerOpen = false;
  let searchModal = null; // {query, startDate, endDate}
  const imageCache = {}; // key -> dataUrl
  let skillFormOpenWorkerId = null;
  const skillGroupOpen = {}; // key: `${workerId}|${section}|${equipmentTypeId||'none'}` -> bool
  let tpSelectedSpecialWorkIds = [];
  let chipMenuState = null; // {type, id, x, y}
  let outsourceFormOpenId = null; // reused inside modal context via eventModal
  let chatMessages = [];
  let chatApiHistory = [];
  let chatFields = {};
  let chatBusy = false;
  let chatPendingProposal = null;
  const chatTravelCache = {};
  async function getTravelMinutes(origin, destination){
    const key = `${origin}|${destination}`;
    if(key in chatTravelCache) return chatTravelCache[key];
    try{
      const res = await fetch(`/.netlify/functions/distance?origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}`);
      if(!res.ok){ chatTravelCache[key] = null; return null; }
      const data = await res.json();
      chatTravelCache[key] = (typeof data.minutes === 'number') ? data.minutes : null;
    }catch(e){ chatTravelCache[key] = null; }
    return chatTravelCache[key];
  }

  const $main = document.getElementById('ss-main');
  const $tabs = document.getElementById('ss-tabs');

  function uid(p){ return p + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
  function fmtDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function todayStr(){ return fmtDate(new Date()); }
  function overlap(aS,aE,bS,bE){ return aS<=bE && bS<=aE; }
  function eqName(id){ const e=state.equipmentTypes.find(e=>e.id===id); return e?e.name:''; }
  function eqColorIdx(id){ const i=state.equipmentTypes.findIndex(e=>e.id===id); return i<0?'#9AA5AB':COLORS[i%COLORS.length]; }
  function wtName(id){ const w=state.workTypes.find(w=>w.id===id); return w?w.name:''; }
  function swName(id){ const s=state.specialWorks.find(s=>s.id===id); return s?s.name:''; }
  function swNames(ids){ return (ids||[]).map(swName).filter(Boolean).join('、'); }
  function worker(id){ return state.workers.find(w=>w.id===id); }
  function vendor(id){ return state.vendors.find(v=>v.id===id); }
  function surnameOf(name){ return (name||'').trim().split(/[\s　]+/)[0] || name; }
  function calendar(id){ return state.calendars.find(c=>c.id===id); }
  function calColor(id){ const c=calendar(id); return c?c.color:'#9AA5AB'; }
  function calName(id){ const c=calendar(id); return c?c.name:'未分類'; }
  function eventColor(p){ return p.color || calColor(p.calendarId); }
  function getLastUsedColor(){
    try{
      const stored = localStorage.getItem('ss-last-color');
      if(stored && EVENT_COLORS.some(c=>c.hex===stored)) return stored;
    }catch(e){}
    return EVENT_COLORS[0].hex;
  }
  function getDayItems(dateStr){
    return state.projects.filter(p => p.start<=dateStr && dateStr<=p.end && calVisible[p.calendarId]!==false)
      .sort((a,b)=>{
        const at = a.startTime||'', bt = b.startTime||'';
        if(!at && bt) return -1;
        if(at && !bt) return 1;
        return at<bt ? -1 : at>bt ? 1 : 0;
      });
  }
  function isMobileViewport(){ return window.innerWidth <= 640; }
  function yen(n){ return '¥' + (Number(n)||0).toLocaleString(); }
  function comboLabel(p){
    if(!p.equipmentTypeId) return p.workTypeId ? wtName(p.workTypeId) : '';
    return eqName(p.equipmentTypeId) + (p.workTypeId?('／'+wtName(p.workTypeId)):'');
  }
  function toast(msg){
    const t=document.createElement('div'); t.className='ss-toast'; t.textContent=msg;
    document.body.appendChild(t); setTimeout(()=>t.remove(),2200);
  }

  async function apiGet(key){
    const r = await fetch('/.netlify/functions/storage?key='+encodeURIComponent(key));
    if(!r.ok) throw new Error('storage get failed');
    const j = await r.json();
    return j.value;
  }
  async function apiSet(key, value){
    const r = await fetch('/.netlify/functions/storage', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({key, value})
    });
    if(!r.ok) throw new Error('storage set failed');
  }

  async function loadAll(){
    const [master, projects] = await Promise.all([
      apiGet('master-data-v4').catch(()=>null),
      apiGet('projects-v4').catch(()=>null),
    ]);
    if(master){
      state.equipmentTypes = master.equipmentTypes || [];
      state.workTypes = master.workTypes || [];
      state.specialWorks = master.specialWorks || [];
      state.workers = master.workers || [];
      state.vendors = master.vendors || [];
      state.disposalSites = master.disposalSites || [];
      state.templates = master.templates || [];
      state.calendars = master.calendars || [];
      state.aiNotes = master.aiNotes || [];
    } else {
      state.equipmentTypes = ['製氷機','縦型冷蔵庫','エアコン','洗浄機'].map(n=>({id:uid('eq'),name:n}));
      state.workTypes = ['新規設置','入替え','廃棄','修理'].map(n=>({id:uid('wt'),name:n}));
      state.specialWorks = [];
      state.workers = [];
      state.vendors = [];
      state.disposalSites = [];
      state.templates = [];
      state.calendars = [
        {id:uid('cal'), name:'メイン', color:CAL_COLORS[0]},
        {id:uid('cal'), name:'営業', color:CAL_COLORS[1]},
        {id:uid('cal'), name:'現場以外', color:CAL_COLORS[2]},
      ];
      state.aiNotes = [];
      await saveMaster();
    }
    // 旧バージョンで「現場」という名前だった場合は「現場以外」へ移行
    const oldGenba = state.calendars.find(c=>c.name==='現場');
    if(oldGenba && !state.calendars.some(c=>c.name==='現場以外')){
      oldGenba.name = '現場以外';
      await saveMaster();
    }
    state.calendars.forEach(c=>{ if(!(c.id in calVisible)) calVisible[c.id]=true; });
    if(projects){
      state.projects = projects.projects || [];
    } else {
      state.projects = [];
      await saveProjects();
    }
  }
  async function saveMaster(){
    try{ await apiSet('master-data-v4', {equipmentTypes:state.equipmentTypes, workTypes:state.workTypes, specialWorks:state.specialWorks, workers:state.workers, vendors:state.vendors, disposalSites:state.disposalSites, templates:state.templates, calendars:state.calendars, aiNotes:state.aiNotes}); }
    catch(e){ console.error('save master failed', e); toast('⚠ 保存に失敗しました。通信環境をご確認ください'); }
  }
  async function saveProjects(){
    try{ await apiSet('projects-v4', {projects:state.projects}); }
    catch(e){ console.error('save projects failed', e); toast('⚠ 保存に失敗しました。通信環境をご確認ください'); }
  }
  function mainCalendarId(){
    const m = state.calendars.find(c=>c.name==='メイン');
    return m ? m.id : (state.calendars[0] ? state.calendars[0].id : null);
  }

  // ---------- scoring engine ----------
  function isAvailable(workerId, start, end, excludeProjectId){
    return !state.projects.some(p => p.id!==excludeProjectId && (p.assignedWorkerIds||[]).includes(workerId) && overlap(p.start,p.end,start,end));
  }
  function levelLabel(n){ return n>=2 ? 'メイン' : '補助'; }
  function skillFor(w, equipmentTypeId, workTypeId){
    const entries = (w.skills||[]).filter(s=>(s.equipmentTypeId||null)===(equipmentTypeId||null) && s.workTypeId===workTypeId);
    if(entries.length===0) return 0;
    return Math.max(...entries.map(e=>e.level));
  }
  function skillEntryFor(w, tpl){
    return (w.skills||[]).find(s=>(s.equipmentTypeId||null)===(tpl.equipmentTypeId||null) && s.workTypeId===tpl.workTypeId);
  }
  function suggest({equipmentTypeId, workTypeId, requiredLevel, start, end, requiredCount}, excludeProjectId, excludeWorkerIds){
    excludeWorkerIds = excludeWorkerIds || [];
    const candidates = state.workers.filter(w=>!excludeWorkerIds.includes(w.id)).map(w=>{
      const skill = skillFor(w, equipmentTypeId, workTypeId);
      const available = isAvailable(w.id, start, end, excludeProjectId||null);
      const cap = w.maxOvertimeHours || 45;
      const overtimeRatio = Math.min(1.5, (w.overtimeHours||0)/cap);
      const qualified = skill >= requiredLevel;
      const score = skill*20 - overtimeRatio*30;
      return {worker:w, skill, available, qualified, overtimeRatio, score};
    });
    const usable = candidates.filter(c=>c.available).sort((a,b)=> (b.qualified-a.qualified) || (b.score-a.score));
    let picked = usable.slice(0, requiredCount);
    if(requiredCount>0 && !picked.some(c=>c.skill>=2)){
      const bestMain = usable.find(c=>c.skill>=2 && !picked.includes(c));
      if(bestMain){
        picked = picked.length>0 ? picked.slice(0, picked.length-1).concat(bestMain) : [bestMain];
      }
    }
    const shortage = Math.max(0, requiredCount - picked.length);
    return {picked, shortage, candidates};
  }
  function vendorsForCombo(equipmentTypeId, workTypeId){
    // 外注は特定の機器×作業内容ではなく「メイン/補助」どちらの作業を任せられるかのみで区別する
    return state.vendors.slice().sort((a,b)=>(b.level||2)-(a.level||2));
  }
  function findTemplate(eq, wt){ return state.templates.find(t=>(t.equipmentTypeId||null)===(eq||null) && t.workTypeId===wt); }
  function addDays(dateStr, n){ const d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n); return fmtDate(d); }

  // ---------- 日本の祝日（1980-2099年の近似式・ハッピーマンデー対応） ----------
  function vernalEquinoxDay(y){ return Math.floor(20.8431 + 0.242194*(y-1980) - Math.floor((y-1980)/4)); }
  function autumnalEquinoxDay(y){ return Math.floor(23.2488 + 0.242194*(y-1980) - Math.floor((y-1980)/4)); }
  function nthWeekdayOfMonth(y, m, weekday, n){
    const firstWeekday = new Date(y, m, 1).getDay();
    const offset = (weekday - firstWeekday + 7) % 7;
    return 1 + offset + (n-1)*7;
  }
  const holidayCache = {};
  function japaneseHolidaysForYear(y){
    const h = {};
    const set = (m,d,name)=>{ h[fmtDate(new Date(y,m,d))] = name; };
    set(0,1,'元日');
    set(0, nthWeekdayOfMonth(y,0,1,2), '成人の日');
    set(1,11,'建国記念の日');
    set(1,23,'天皇誕生日');
    set(2, vernalEquinoxDay(y), '春分の日');
    set(3,29,'昭和の日');
    set(4,3,'憲法記念日');
    set(4,4,'みどりの日');
    set(4,5,'こどもの日');
    set(6, nthWeekdayOfMonth(y,6,1,3), '海の日');
    set(7,11,'山の日');
    set(8, nthWeekdayOfMonth(y,8,1,3), '敬老の日');
    set(8, autumnalEquinoxDay(y), '秋分の日');
    set(9, nthWeekdayOfMonth(y,9,1,2), 'スポーツの日');
    set(10,3,'文化の日');
    set(10,23,'勤労感謝の日');
    Object.keys(h).sort().forEach(dateStr=>{
      const d = new Date(dateStr+'T00:00:00');
      if(d.getDay()===0){
        let sub = new Date(d);
        do{ sub.setDate(sub.getDate()+1); } while(h[fmtDate(sub)]);
        h[fmtDate(sub)] = '振替休日';
      }
    });
    return h;
  }
  function isJapaneseHoliday(dateStr){
    const y = Number(dateStr.slice(0,4));
    if(!holidayCache[y]) holidayCache[y] = japaneseHolidaysForYear(y);
    return holidayCache[y][dateStr] || null;
  }
  function templateLabel(t){ return t.equipmentTypeId ? `${eqName(t.equipmentTypeId)}／${wtName(t.workTypeId)}` : `${wtName(t.workTypeId)}（機器を問わない）`; }
  function groupedTemplatesForSkills(){
    const groups = [];
    state.equipmentTypes.forEach(eq=>{
      const templates = state.templates.filter(t=>t.equipmentTypeId===eq.id);
      if(templates.length) groups.push({key:eq.id, label:eq.name, templates});
    });
    const standalone = state.templates.filter(t=>!t.equipmentTypeId);
    if(standalone.length) groups.push({key:'none', label:'機器を問わない', templates:standalone});
    return groups;
  }
  function renderSkillGroupTree(workerId, section, levelMin){
    const groups = groupedTemplatesForSkills();
    const w = worker(workerId);
    return groups.map(g=>{
      const openKey = `${workerId}|${section}|${g.key}`;
      const open = !!skillGroupOpen[openKey];
      const onCount = g.templates.filter(t=>skillFor(w,t.equipmentTypeId,t.workTypeId)>=levelMin).length;
      return `
        <div class="ss-skill-group">
          <div class="ss-skill-group-head" data-skill-group-toggle="${openKey}">
            <span class="ss-skill-caret">${open?'▾':'▸'}</span>
            <span class="ss-skill-eqname">${g.label}</span>
            <span class="ss-skill-count">${onCount}/${g.templates.length}</span>
          </div>
          ${open ? `<div class="ss-skill-group-body">${g.templates.map(t=>`<span class="ss-chiptoggle ${skillFor(w,t.equipmentTypeId,t.workTypeId)>=levelMin?'on':''}" data-skill-${section}="${workerId}|${t.id}">└ ${wtName(t.workTypeId)}</span>`).join('')}</div>` : ''}
        </div>`;
    }).join('');
  }
  async function resolveNamedWorkers(names, equipmentTypeId, workTypeId){
    if(!names || names.length===0) return [];
    let created = false;
    const resolved = names.map(nameRaw=>{
      const name = String(nameRaw).trim();
      if(!name) return null;
      let w = state.workers.find(w=>w.name===name);
      if(!w){
        w = {id:uid('w'), name, type:'社員', skills: equipmentTypeId&&workTypeId ? [{id:uid('sk'), equipmentTypeId, workTypeId, level:2}] : [], overtimeHours:0, maxOvertimeHours:45};
        state.workers.push(w);
        created = true;
      }
      return w;
    }).filter(Boolean);
    if(created) await saveMaster();
    return resolved;
  }

  // ---------- import ----------
  function parseDateLoose(str){
    if(!str) return null;
    str = str.trim();
    let m = str.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
    if(!m) return null;
    return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  }
  function parseAmount(str){ if(!str) return 0; const v=parseInt(String(str).replace(/[¥,\s]/g,''),10); return isNaN(v)?0:v; }
  function parseImportText(text){ return text.split(/\r?\n/).filter(l=>l.trim().length>0).map(l => l.includes('\t') ? l.split('\t') : l.split(',')); }
  async function runImport(text){
    let rows = parseImportText(text);
    if(rows.length && /施行日|物件名|日付/.test(rows[0].join(''))) rows = rows.slice(1);
    let count = 0;
    rows.forEach(cols=>{
      const [dateRaw, salesRep, name, address, workDetail, budgetRaw, actualRaw] = cols;
      if(!name || !name.trim()) return;
      const d = parseDateLoose(dateRaw) || todayStr();
      state.projects.push({
        id: uid('p'), name: name.trim(), address:(address||'').trim(), salesRep:(salesRep||'').trim(),
        workDetail:(workDetail||'').trim(), equipmentTypeId:null, workTypeId:null,
        requiredLevel:1, start:d, end:d, allDay:true, requiredCount:1, assignedWorkerIds:[], outsourceCount:0,
        vendorEntries:[], budgetAmount:parseAmount(budgetRaw), actualAmount:parseAmount(actualRaw),
        calendarId: mainCalendarId(), createdAt:new Date().toISOString(),
      });
      count++;
    });
    await saveProjects();
    toast(`${count}件を取り込みました`);
    renderCalendar();
  }

  function attachChipInteractions(containerId, type){
    const container = document.getElementById(containerId);
    if(!container) return;
    container.querySelectorAll('[data-chip-id]').forEach(chip=>{
      let pressTimer=null, startX=0, startY=0, dragging=false, moved=false;
      chip.addEventListener('pointerdown', e=>{
        startX=e.clientX; startY=e.clientY; moved=false; dragging=false;
        try{ chip.setPointerCapture(e.pointerId); }catch(err){ /* ignore: not all pointer sessions support capture */ }
        pressTimer = setTimeout(()=>{
          dragging = true;
          chip.classList.add('dragging');
        }, 350);
      });
      chip.addEventListener('pointermove', e=>{
        const dx=e.clientX-startX, dy=e.clientY-startY;
        if(!dragging && Math.hypot(dx,dy)>10){ clearTimeout(pressTimer); }
        if(!dragging) return;
        moved = true;
        chip.style.pointerEvents='none';
        const under = document.elementFromPoint(e.clientX, e.clientY);
        chip.style.pointerEvents='';
        const targetChip = under && under.closest('[data-chip-id]');
        if(targetChip && targetChip!==chip && targetChip.parentElement===chip.parentElement && targetChip.dataset.chipType===type){
          const { list } = chipTypeConfig(type);
          const fromIdx = list.findIndex(x=>x.id===chip.dataset.chipId);
          const toIdx = list.findIndex(x=>x.id===targetChip.dataset.chipId);
          if(fromIdx>-1 && toIdx>-1 && fromIdx!==toIdx){
            const [movedItem] = list.splice(fromIdx,1);
            list.splice(toIdx,0,movedItem);
            if(fromIdx < toIdx) container.insertBefore(chip, targetChip.nextSibling);
            else container.insertBefore(chip, targetChip);
          }
        }
      });
      chip.addEventListener('pointerup', async e=>{
        clearTimeout(pressTimer);
        if(dragging){
          chip.classList.remove('dragging');
          dragging = false;
          await saveMaster();
          return;
        }
        if(!moved){
          const rect = chip.getBoundingClientRect();
          chipMenuState = { type, id: chip.dataset.chipId, x: Math.min(rect.left, window.innerWidth-190), y: rect.bottom+4 };
          render();
        }
      });
    });
  }

  function hrmosOvertimeMinutes(rec){
    const t = rec.total_over_work_time;
    if(!t) return 0;
    const [h,m] = String(t).split(':').map(Number);
    return (h||0)*60 + (m||0);
  }
  async function fetchHrmosData(){
    const month = document.getElementById('hrmos-month').value;
    const $result = document.getElementById('hrmos-result');
    if(!month){ toast('対象月を選択してください'); return; }
    $result.innerHTML = `<div class="ss-empty">取得中…</div>`;
    try{
      const res = await fetch(`/.netlify/functions/hrmos?month=${month}`);
      const data = await res.json();
      if(!res.ok || data.error){
        $result.innerHTML = `<div class="ss-alert">⚠ 取得に失敗しました：${(data.error||'')} ${data.detail?`<br><span class="mono" style="font-size:11px;">${String(data.detail).slice(0,300)}</span>`:''}</div>`;
        return;
      }
      const byName = {};
      (data.records||[]).forEach(rec=>{
        const name = rec.full_name; if(!name) return;
        byName[name] = (byName[name]||0) + hrmosOvertimeMinutes(rec);
      });
      const rows = Object.entries(byName).map(([name,mins])=>({name, hours: Math.round(mins/6)/10}));
      const sample = (data.records||[])[0];
      $result.innerHTML = `
        <div class="ss-hint" style="margin-bottom:8px;">${data.count||0}件の日次データを集計しました。以下はHRMOSが算出した「月間の総残業時間（total_over_work_time）」です。氏名が完全一致する人員にのみ反映できます。</div>
        ${rows.length===0 ? '<div class="ss-empty">対象月のデータがありませんでした。</div>' : `
        <div class="ss-table-wrap"><table class="ss-table">
          <tr><th>氏名（HRMOS）</th><th>月間残業時間</th><th>一致する人員</th><th></th></tr>
          ${rows.map(r=>{
            const match = state.workers.find(w=>w.name===r.name);
            return `<tr>
              <td>${r.name}</td>
              <td class="mono">${r.hours}h</td>
              <td>${match ? match.name : '<span class="ss-empty" style="padding:0;">一致なし</span>'}</td>
              <td>${match ? `<button class="ss-btn ghost small" data-hrmos-apply="${match.id}" data-hrmos-hours="${r.hours}">今週残業に反映</button>` : ''}</td>
            </tr>`;
          }).join('')}
        </table></div>`}
        ${sample ? `<details class="ss-details" style="margin-top:8px;"><summary>生データのサンプル（1件目）を見る</summary><pre class="mono" style="font-size:11px;white-space:pre-wrap;background:var(--paper);padding:8px;border-radius:6px;margin-top:6px;">${JSON.stringify(sample,null,2)}</pre></details>` : ''}
      `;
      $result.querySelectorAll('[data-hrmos-apply]').forEach(btn=>btn.onclick=async()=>{
        const w = worker(btn.dataset.hrmosApply);
        w.overtimeHours = Number(btn.dataset.hrmosHours)||0;
        await saveMaster();
        renderWorkerList();
        toast(`${w.name}さんの残業時間を反映しました`);
      });
    }catch(err){
      $result.innerHTML = `<div class="ss-alert">⚠ 通信エラーが発生しました：${String(err)}</div>`;
    }
  }

  function attachTemplateRowDrag(){
    document.querySelectorAll('[data-drag-tpl]').forEach(handle=>{
      const row = handle.closest('tr');
      let pressTimer=null, startX=0, startY=0, dragging=false;
      handle.addEventListener('pointerdown', e=>{
        startX=e.clientX; startY=e.clientY; dragging=false;
        try{ handle.setPointerCapture(e.pointerId); }catch(err){}
        pressTimer = setTimeout(()=>{ dragging=true; row.style.opacity='0.5'; }, 350);
      });
      handle.addEventListener('pointermove', e=>{
        const dx=e.clientX-startX, dy=e.clientY-startY;
        if(!dragging && Math.hypot(dx,dy)>10){ clearTimeout(pressTimer); }
        if(!dragging) return;
        handle.style.pointerEvents='none';
        const under = document.elementFromPoint(e.clientX, e.clientY);
        handle.style.pointerEvents='';
        const targetRow = under && under.closest('tr[data-tpl-id]');
        if(targetRow && targetRow!==row){
          const fromIdx = state.templates.findIndex(t=>t.id===row.dataset.tplId);
          const toIdx = state.templates.findIndex(t=>t.id===targetRow.dataset.tplId);
          if(fromIdx>-1 && toIdx>-1 && fromIdx!==toIdx){
            const [moved] = state.templates.splice(fromIdx,1);
            state.templates.splice(toIdx,0,moved);
            if(fromIdx<toIdx) targetRow.after(row); else targetRow.before(row);
          }
        }
      });
      handle.addEventListener('pointerup', async()=>{
        clearTimeout(pressTimer);
        if(dragging){ row.style.opacity=''; dragging=false; await saveMaster(); }
      });
    });
  }

  function buildMonthCellsHtml(year, monthIndex){
    const today = todayStr();
    const first = new Date(year, monthIndex, 1);
    const startOffset = (first.getDay() + 6) % 7;
    const startDate = new Date(year, monthIndex, 1 - startOffset);
    let html = '';
    for(let i=0;i<42;i++){
      const cellDate = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate()+i);
      const dateStr = fmtDate(cellDate);
      const inMonth = cellDate.getMonth()===((monthIndex%12+12)%12);
      const items = getDayItems(dateStr);
      const shown = items.slice(0, MAX_CHIPS_PER_CELL);
      const overflow = items.length - shown.length;
      const dow = cellDate.getDay();
      const dNumClass = (dow===0 || isJapaneseHoliday(dateStr)) ? 'sun' : dow===6 ? 'sat' : '';
      html += `<div class="ss-cal-cell ${dateStr===today?'today':''} ${inMonth?'':'other-month'} ${dateStr===calSelectedDate?'selected':''}" data-day="${dateStr}"><div class="d ${dNumClass}">${cellDate.getDate()}</div>
        ${shown.map(p=>`<div class="ss-cal-item" style="background:${eventColor(p)}" title="${p.name}">${p.name}${p.url?' 🔗':''}</div>`).join('')}
        ${overflow>0 ? `<div class="ss-cal-more">+${overflow}</div>` : ''}
      </div>`;
    }
    return html;
  }

    const $swipe = document.getElementById('cal-swipearea');
    const $track = document.getElementById('cal-track');
    let dragging=false, startX=0, startY=0, dragDX=0, axisLocked=null;
    $swipe.addEventListener('touchstart', e=>{
      dragging=true; axisLocked=null; dragDX=0;
      startX=e.touches[0].clientX; startY=e.touches[0].clientY;
      $track.classList.add('dragging');
    }, {passive:true});
    $swipe.addEventListener('touchmove', e=>{
      if(!dragging) return;
      const dx = e.touches[0].clientX-startX, dy = e.touches[0].clientY-startY;
      if(axisLocked===null) axisLocked = Math.abs(dx)>Math.abs(dy) ? 'x' : 'y';
      if(axisLocked==='y') return;
      e.preventDefault();
      dragDX = dx;
      const pct = -33.3333 + (dx / $swipe.clientWidth * 33.3333);
      $track.style.transform = `translateX(${pct}%)`;
    }, {passive:false});
    $swipe.addEventListener('touchend', ()=>{
      if(!dragging) return;
      dragging=false;
      $track.classList.remove('dragging');
      const threshold = $swipe.clientWidth * 0.22;
      if(axisLocked==='x' && Math.abs(dragDX) > threshold){

        $track.style.transform = `translateX(${-33.3333 - dir*33.3333}%)`;

  function attachSwipeGestures(overlayId, {onSwipeRight, onSwipeLeft, onSwipeDown}={}){
    const overlay = document.getElementById(overlayId);
    if(!overlay) return;
    const modal = overlay.querySelector('.ss-modal');
    if(!modal) return;
    let startX=0, startY=0, dragging=false, axis=null;
    overlay.addEventListener('touchstart', e=>{
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
      axis = null; dragging = true;
      modal.style.transition = 'none';
    }, {passive:true});
    overlay.addEventListener('touchmove', e=>{
      if(!dragging) return;
      const dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
      if(axis===null) axis = Math.abs(dx)>Math.abs(dy) ? 'x' : 'y';
      if(axis==='x' && dx>0 && onSwipeRight) modal.style.transform = `translateX(${dx}px)`;
      else if(axis==='y' && dy>0 && onSwipeDown) modal.style.transform = `translateY(${dy}px)`;
    }, {passive:true});
    overlay.addEventListener('touchend', e=>{
      if(!dragging) return;
      dragging = false;
      const dx = e.changedTouches[0].clientX - startX, dy = e.changedTouches[0].clientY - startY;
      modal.style.transition = 'transform 0.2s ease-out';
      if(axis==='x' && dx>70 && onSwipeRight){ modal.style.transform = 'translateX(100%)'; setTimeout(onSwipeRight, 200); }
      else if(axis==='x' && dx<-70 && onSwipeLeft){ modal.style.transform=''; onSwipeLeft(); }
      else if(axis==='y' && dy>70 && onSwipeDown){ modal.style.transform = 'translateY(100%)'; setTimeout(onSwipeDown, 200); }
      else modal.style.transform = '';
      axis = null;
    }, {passive:true});
  }

  function attachDayListHorizontalSwipe(overlay){
    const content = overlay.querySelector('#daylist-swipearea');
    if(!content) return;
    let startX=0, startY=0, dragging=false, axis=null;
    overlay.addEventListener('touchstart', e=>{
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
      axis = null; dragging = true;
      content.style.transition = 'none';
    }, {passive:true});
    overlay.addEventListener('touchmove', e=>{
      if(!dragging) return;
      const dx = e.touches[0].clientX-startX, dy = e.touches[0].clientY-startY;
      if(axis===null) axis = Math.abs(dx)>Math.abs(dy) ? 'x' : 'y';
      if(axis!=='x') return;
      content.style.transform = `translateX(${dx}px)`;
    }, {passive:true});
    overlay.addEventListener('touchend', e=>{
      if(!dragging) return;
      dragging = false;
      if(axis!=='x'){ axis=null; return; }
      const dx = e.changedTouches[0].clientX - startX;
      content.style.transition = 'transform 0.2s ease-out';
      if(dx < -70){
        content.style.transform = 'translateX(-100%)';
        setTimeout(()=>shiftDayList(1), 200);
      } else if(dx > 70){
        content.style.transform = 'translateX(100%)';
        setTimeout(()=>shiftDayList(-1), 200);
      } else {
        content.style.transform = '';
      }
      axis = null;
    }, {passive:true});
  }

  function resizeImageToDataUrl(file, maxDim, quality){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = ()=>{
        const img = new Image();
        img.onload = ()=>{
          let {width, height} = img;
          if(width>maxDim || height>maxDim){
            const ratio = Math.min(maxDim/width, maxDim/height);
            width = Math.round(width*ratio); height = Math.round(height*ratio);
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function attachPinchZoom(img){
    let scale=1, startDist=0, startScale=1, lastTap=0;
    let panX=0, panY=0, startPanX=0, startPanY=0, startTouchX=0, startTouchY=0;
    const dist = (t0,t1)=>Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY);
    const apply = ()=>{ img.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`; };
    const setOriginFromPoint = (x,y)=>{
      const rect = img.getBoundingClientRect();
      const ox = Math.min(100, Math.max(0, ((x-rect.left)/rect.width)*100));
      const oy = Math.min(100, Math.max(0, ((y-rect.top)/rect.height)*100));
      img.style.transformOrigin = `${ox}% ${oy}%`;
    };
    img.addEventListener('touchstart', e=>{
      if(e.touches.length===2){
        startDist = dist(e.touches[0], e.touches[1]); startScale = scale;
        setOriginFromPoint((e.touches[0].clientX+e.touches[1].clientX)/2, (e.touches[0].clientY+e.touches[1].clientY)/2);
      } else if(e.touches.length===1){
        startTouchX = e.touches[0].clientX; startTouchY = e.touches[0].clientY;
        startPanX = panX; startPanY = panY;
      }
    }, {passive:true});
    img.addEventListener('touchmove', e=>{
      if(e.touches.length===2 && startDist>0){
        e.preventDefault();
        scale = Math.min(5, Math.max(1, startScale * (dist(e.touches[0], e.touches[1]) / startDist)));
        if(scale<=1){ panX=0; panY=0; img.style.transformOrigin='center center'; }
        apply();
      } else if(e.touches.length===1 && scale>1){
        e.preventDefault();
        panX = startPanX + (e.touches[0].clientX - startTouchX);
        panY = startPanY + (e.touches[0].clientY - startTouchY);
        apply();
      }
    }, {passive:false});
    img.addEventListener('touchend', e=>{
      if(e.touches.length===0){
        const now = Date.now();
        if(scale<=1.02 && now-lastTap<300){
          const t = e.changedTouches[0];
          setOriginFromPoint(t.clientX, t.clientY);
          scale = 2.5;
        } else if(scale<=1.02){
          scale=1; panX=0; panY=0; img.style.transformOrigin='center center';
        }
        apply();
        lastTap = now;
      }
    }, {passive:true});
  }

【搬出・廃棄を伴う工事（入替え・廃棄・撤去など）の場合】
現場での作業時間、廃棄場までの移動時間、廃棄場の営業時間、昼休憩を踏まえて、その日のうちに廃棄場への搬入が間に合うかを検討してください。間に合わない場合は、翌営業日以降に廃棄場へ搬入する前提で日程・注意事項を提案し、その判断理由を fields.logisticsNote に簡潔に記載してください（例：「〇〇廃棄場は17時閉場のため、作業完了が17時を過ぎる場合は翌営業日搬入としてください」）。判断材料が不足する場合は、その旨を質問してください。

【階段作業について】
搬入経路に階段がある、エレベーターが無い、階段での運搬になる、といった言及があった場合は fields.stairs を true にしてください。標準人数への+2名の加算はシステム側で自動的に行うため、あなたが人数を書き換える必要はありません。

【機器種類を問わない作業内容について】
作業内容が「修理」「給排水工事」「電気工事」「シンク穴開け」「板金加工」「コーキング」「棚取り付け」のいずれかの場合、機器種類は特定の機器と紐づかない単独の作業として扱ってください。ユーザーが対象機器を明言しない限り fields.equipmentTypeId は null のままにしてください（無理に機器種類を推測しないでください）。

【機器種類の判断について・重要】
ユーザーが「ショーケース」「冷凍ストッカー」など、登録済みの機器種類に無い言葉を使った場合、寸法（幅・奥行・高さ）だけで似ている既存の機器種類（例：縦型冷蔵庫）に無理に当てはめないでください。ユーザーが書いた言葉を優先し、以下のいずれかで対応してください：
1. 登録済みの機器種類に該当するものが無いと判断した場合 → fields.equipmentTypeId は null のままにし、fields.newEquipmentTypeName に新しい機器種類名の案（例：「冷蔵ショーケース」）を入れて、ユーザーに新しい機器種類として登録してよいか確認してください。
2. 型式名（アルファベット+数字の品番など）が含まれているが、それが実際にどんな製品か確信が持てない場合 → 寸法だけで断定せず、素直に「型式〇〇は具体的にどのような機器ですか？」と質問してください（あなたはインターネット検索ができないため、型式から製品を特定できません）。

【重要】以下の場合は status を "ready" にする前に、必ず追加で質問してください：
- 登録済み人員が0人、またはユーザーが言及した担当者の名前が登録済み人員に見つからない場合 → 「今回担当される方のお名前を教えてください（複数可）」のように質問し、fields.newWorkerNames に名前の配列を入れてください。
- 選択された機器種類×作業内容の組み合わせのテンプレートが登録済みテンプレートに存在しない場合 → 「標準的な作業時間と人数を教えてください（今後のテンプレートとして登録します）」のように質問し、fields.newTemplateDuration（数値）、fields.newTemplateUnit（"時間"か"日"）、fields.newTemplateCount（人数）を埋めてください。
- fields.newEquipmentTypeName を提案した場合 → 「新しい機器種類として『〇〇』を登録してよいですか？」のように確認し、ユーザーが承諾するまで status は "ask" のままにしてください。
これらの確認が済んでいない状態では status を "ask" のままにしてください。ユーザーが「わからない」「後で」など回答をスキップする意思を示した場合は、その項目は諦めて ready に進めてください。

【質問の仕方】未確定の項目が複数ある場合は、1つずつ聞き返さず、まとめて1回のreplyで箇条書きなどにして質問してください（例：「①現場名を教えてください　②担当者のお名前を教えてください」）。ユーザーは複数の質問にまとめて1回で回答することがあるので、その回答から複数のfieldsを同時に埋めてください。

必ず次のJSON形式のみで回答してください（説明文やコードフェンスは一切不要、JSONのみ）:
{
  "status": "ask" または "ready",
  "reply": "ユーザーに見せる短い日本語の返信。ask の場合は未確定の項目をまとめて質問し、ready の場合は簡潔な確認メッセージ",
  "quickReplies": ["選択肢1", "選択肢2", ...] または null,
  "learningNote": "今回の会話で今後の会話でも活用すべき固有の知識があれば1文で（例：「型式AGV-G3400XCは冷蔵ショーケースである」）。特になければnull",
  "fields": {
    "name": "現場名・物件名 または null",
    "address": "住所や地域 または null",
    "equipmentTypeId": "機器種類のID または null",
    "workTypeId": "作業内容のID または null",
    "newEquipmentTypeName": "既存の機器種類に無いと判断した場合の新しい機器種類名の案 または null",
    "requiredCount": "ユーザーが人数を明言した場合のみ数値、それ以外はnull",
    "date": "YYYY-MM-DD または null",
    "refrigerant": true/false（冷媒工事の言及があるか）,
    "removal": true/false（搬出・撤去の言及があるか）,
    "stairs": true/false（階段作業の言及があるか。標準人数+2名は自動で行われます）,
    "note": "夜間のみ、等の特記事項（階段作業は含めなくてよい）。なければnull",
    "newWorkerNames": ["担当者名", ...] または null,
    "newTemplateDuration": 数値 または null,
    "newTemplateUnit": "時間"または"日" または null,
    "newTemplateCount": 数値 または null,
    "logisticsNote": "廃棄場の営業時間・移動時間を踏まえた判断や注意事項。該当なければnull"
  }
}
quickReplies には、status が "ask" の時のみ、ユーザーがタップするだけで回答できる短い選択肢を入れてください（機器種類名、作業内容名、登録済み人員名、「はい」「いいえ」など具体的な文字列。自由記述でしか答えられない質問しかない場合はnullまたは空配列にしてください）。これまでの会話で判明している項目は fields に必ず引き継いでください。`;
  }
  async function sendChatMessage(){
    const $input = document.getElementById('chat-input');
    const text = $input.value.trim();
    if(!text || chatBusy) return;
    $input.value = '';
    chatMessages.push({role:'user', text});
    chatApiHistory.push({role:'user', content:text});
    chatBusy = true;
    renderChatLog();
    try{
      const response = await fetch('/.netlify/functions/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ system: await buildChatSystemPrompt(), messages: chatApiHistory })
      });
      if(!response.ok) throw new Error('chat function error');
      const data = await response.json();
      const raw = (data.content||[]).map(c=>c.text||'').join('');
      chatApiHistory.push({role:'assistant', content:raw});
      let parsed;
      try{ parsed = JSON.parse(raw.replace(/```json|```/g,'').trim()); }
      catch(e){ parsed = {status:'ask', reply: raw || 'すみません、うまく聞き取れませんでした。もう一度お願いします。', fields:{}}; }
      const prevLogisticsNote = chatFields.logisticsNote || null;
      chatFields = Object.assign({}, chatFields, parsed.fields||{});
      chatBusy = false;
      const quickReplies = (parsed.status==='ask' && Array.isArray(parsed.quickReplies)) ? parsed.quickReplies.filter(Boolean) : [];
      chatMessages.push({role:'ai', text: parsed.reply || '...', quickReplies});
      if(chatFields.logisticsNote && chatFields.logisticsNote!==prevLogisticsNote){
        chatMessages.push({role:'system', text:`🚚 ${chatFields.logisticsNote}`});
      }
      if(parsed.learningNote && !(state.aiNotes||[]).includes(parsed.learningNote)){
        state.aiNotes = (state.aiNotes||[]).concat(parsed.learningNote);
        await saveMaster();
        renderAiNotesList();
        chatMessages.push({role:'system', text:`🧠 学習しました：${parsed.learningNote}`});
      }
      if(parsed.status === 'ready'){
        if(chatFields.newEquipmentTypeName && !chatFields.equipmentTypeId){
          const name = String(chatFields.newEquipmentTypeName).trim();
          let eqType = state.equipmentTypes.find(e=>e.name===name);
          if(!eqType){
            eqType = {id:uid('eq'), name};
            state.equipmentTypes.push(eqType);
            await saveMaster();
            chatMessages.push({role:'system', text:`🗂 新しい機器種類を登録しました：${name}`});
          }
          chatFields.equipmentTypeId = eqType.id;
        }
        if(chatFields.newTemplateDuration && chatFields.newTemplateUnit && chatFields.newTemplateCount && chatFields.equipmentTypeId && chatFields.workTypeId){
          const existing = findTemplate(chatFields.equipmentTypeId, chatFields.workTypeId);
          if(!existing){
            state.templates.push({id:uid('tp'), equipmentTypeId:chatFields.equipmentTypeId, workTypeId:chatFields.workTypeId, durationValue:chatFields.newTemplateDuration, durationUnit:chatFields.newTemplateUnit, requiredCount:chatFields.newTemplateCount});
            await saveMaster();
            chatMessages.push({role:'system', text:`🗂 新しいテンプレートを登録しました：${eqName(chatFields.equipmentTypeId)}／${wtName(chatFields.workTypeId)}（${chatFields.newTemplateDuration}${chatFields.newTemplateUnit}・${chatFields.newTemplateCount}人）`});
          }
        }
        let namedWorkers = [];
        if(chatFields.newWorkerNames && chatFields.newWorkerNames.length){
          const beforeNames = state.workers.map(w=>w.name);
          namedWorkers = await resolveNamedWorkers(chatFields.newWorkerNames, chatFields.equipmentTypeId, chatFields.workTypeId);
          const addedNames = namedWorkers.filter(w=>!beforeNames.includes(w.name)).map(w=>w.name);
          if(addedNames.length) chatMessages.push({role:'system', text:`👷 新しい人員を登録しました：${addedNames.join('、')}`});
        }
        const proposal = computeChatProposal(chatFields, namedWorkers);
        chatPendingProposal = proposal;
        chatMessages.push({role:'proposal', data: proposal});
      }
      renderChatLog();
    }catch(err){
      chatBusy = false;
      chatMessages.push({role:'system', text:'⚠ AIとの通信でエラーが発生しました。もう一度お試しください。'});
      renderChatLog();
    }
  }
  function computeChatProposal(fields, namedWorkers){
    namedWorkers = namedWorkers || [];
    const tmpl = findTemplate(fields.equipmentTypeId, fields.workTypeId);
    let requiredCount = fields.requiredCount || (tmpl ? tmpl.requiredCount : Math.max(2, namedWorkers.length));
    if(fields.stairs) requiredCount += 2;
    const start = fields.date || todayStr();
    let end = start;
    if(tmpl && tmpl.durationUnit==='日'){ end = addDays(start, Math.max(0, Math.ceil(tmpl.durationValue)-1)); }

    let picked = namedWorkers.map(w=>({worker:w, skill: skillFor(w, fields.equipmentTypeId, fields.workTypeId)}));
    let shortage = 0;
    if(picked.length < requiredCount){
      const result = suggest({equipmentTypeId:fields.equipmentTypeId, workTypeId:fields.workTypeId, requiredLevel:2, start, end, requiredCount: requiredCount - picked.length}, null, picked.map(c=>c.worker.id));
      picked = picked.concat(result.picked);
      shortage = result.shortage;
    }
    const vendorCands = vendorsForCombo(fields.equipmentTypeId, fields.workTypeId);
    const warnings = [];
    if(fields.refrigerant) warnings.push('冷媒工事の言及あり：冷媒資格者を含めて配置してください。');
    if(fields.removal) warnings.push('搬出・撤去あり：車両・台車の手配を忘れずに。');
    if(fields.stairs) warnings.push('階段作業のため、通常より2名多く配置しています。');
    if(fields.note) warnings.push(fields.note);
    if(fields.logisticsNote) warnings.push(`🚚 ${fields.logisticsNote}`);
    if(shortage>0) warnings.push(`内部人員だけでは${shortage}名不足しています。外注の手配を検討してください。`);
    return {
      name: fields.name || '(名称未設定)', address: fields.address||'', equipmentTypeId: fields.equipmentTypeId,
      workTypeId: fields.workTypeId, start, end, requiredCount,
      picked: picked.map(c=>({id:c.worker.id, name:c.worker.name, skill:c.skill, overtimeHours:c.worker.overtimeHours||0})),
      shortage, vendorCands: vendorCands.map(v=>v.name), warnings,
      estimatedHours: tmpl ? `${tmpl.durationValue}${tmpl.durationUnit}` : '(テンプレート未登録)',
      calendarId: mainCalendarId(),
    };
  }
  function renderProposalCardHtml(p){
    return `<div class="ss-proposal-card">
      <div class="ptitle">📋 提案：${p.name}</div>
      <div style="font-size:12.5px;color:var(--muted);margin-bottom:8px;" class="mono">${p.start}${p.start!==p.end?(' 〜 '+p.end):''} ／ ${comboLabel(p)} ／ 想定時間:${p.estimatedHours}</div>
      <div class="ss-subhead" style="margin:6px 0 4px;">推奨人員（内部）</div>
      ${p.picked.length===0 ? '<div class="ss-empty" style="padding:2px;">候補なし</div>' :
        p.picked.map(w=>`<span class="ss-skillchip"><span class="lv">${levelLabel(w.skill)}</span>${w.name}<span style="color:var(--muted);font-size:10px;margin-left:3px;">(残業${w.overtimeHours}h)</span></span>`).join('')}
      ${p.shortage>0 ? `<div class="ss-shortage" style="margin-top:8px;">⚠ ${p.shortage}名不足。${p.vendorCands.length?('外注候補：'+p.vendorCands.join('、')):'対応可能な外注先が未登録です。'}</div>` : ''}
      ${p.warnings.length ? `<div style="margin-top:8px;">${p.warnings.map(w=>`<div style="font-size:12px;color:var(--amber-deep);">⚠ ${w}</div>`).join('')}</div>` : ''}
      <button class="ss-btn amber small" id="chat-confirm-proposal" style="margin-top:10px;">この内容でカレンダー登録する</button>
    </div>`;
  }
  async function confirmChatProposal(p){
    state.projects.push({
      id: uid('p'), name: p.name, address: p.address, salesRep: '', workDetail: p.warnings.join('／'),
      equipmentTypeId: p.equipmentTypeId, workTypeId: p.workTypeId, requiredLevel: 2, start: p.start, end: p.end,
      allDay:true, requiredCount: p.requiredCount, assignedWorkerIds: p.picked.map(w=>w.id), outsourceCount: p.shortage,
      vendorEntries: [], budgetAmount: 0, actualAmount: 0, calendarId: p.calendarId, createdAt: new Date().toISOString(),
    });
    await saveProjects();
    chatMessages.push({role:'system', text:'✅ カレンダーに登録しました。'});
    chatPendingProposal = null;
    toast('案件をカレンダーに登録しました');
    tab = 'calendar';
    render();
  }
})();

  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('/sw.js').catch(()=>{}); });
