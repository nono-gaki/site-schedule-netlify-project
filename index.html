<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#16232F;--navy-2:#1F3040;--paper:#F3F5F4;--card:#FFFFFF;--line:#DBE1E2;--ink:#1B2530;--muted:#748089;
    --amber:#E7A23A;--amber-deep:#B87A1E;--danger:#D2503C;--danger-bg:#FBEAE6;--ok:#3E8E63;--ok-bg:#E7F3EB;
    --violet:#6A4A8A;--violet-bg:#F1E7F5;--teal:#2E7D74;--teal-bg:#E4F1EF;--radius:10px;
  }
  *{box-sizing:border-box;}
  #ss-root{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);min-height:100%;padding:0;font-size:14px;line-height:1.5;}
  #ss-root .mono{font-family:'JetBrains Mono',monospace;}
  #ss-root h1,#ss-root h2,#ss-root h3,#ss-root .disp{font-family:'Barlow Condensed',sans-serif;letter-spacing:.02em;}
  .ss-header{
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 28px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 28px),
      linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
    color:#EFF3F5;padding:22px 24px 0 24px;border-bottom:3px solid var(--amber);
  }
  .ss-header-top{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .ss-title{font-size:26px;font-weight:700;text-transform:uppercase;margin:0;}
  .ss-title span{color:var(--amber);}
  .ss-sub{font-size:12px;color:#B9C4CB;font-family:'JetBrains Mono',monospace;letter-spacing:.03em;}
  .ss-tabs{display:flex;gap:2px;overflow-x:auto;}
  .ss-tab{padding:10px 16px;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:14.5px;color:#C3CDD3;background:transparent;border:none;cursor:pointer;border-radius:8px 8px 0 0;white-space:nowrap;letter-spacing:.03em;}
  .ss-tab.active{background:var(--paper);color:var(--navy);}
  .ss-tab:not(.active):hover{background:rgba(255,255,255,0.08);color:#fff;}
  .ss-main{padding:22px 24px 60px 24px;max-width:1220px;margin:0 auto;}
  .ss-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:18px;}
  .ss-card-title{font-size:13px;text-transform:uppercase;color:var(--muted);font-weight:600;letter-spacing:.08em;margin:0 0 14px 0;padding-bottom:8px;border-bottom:1px dashed var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  .ss-card-title small{font-family:'Inter',sans-serif;text-transform:none;letter-spacing:0;font-size:11.5px;color:var(--muted);}
  .ss-subhead{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13.5px;color:var(--navy);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.04em;}
  .ss-grid{display:grid;gap:14px;}
  .ss-grid.cols-3{grid-template-columns:repeat(3,1fr);}
  .ss-grid.cols-4{grid-template-columns:repeat(4,1fr);}
  @media(max-width:800px){.ss-grid.cols-3,.ss-grid.cols-4{grid-template-columns:1fr 1fr;}}
  @media(max-width:520px){.ss-grid.cols-3,.ss-grid.cols-4{grid-template-columns:1fr;}}
  .ss-stat{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:12px 14px;}
  .ss-stat b{display:block;font-family:'JetBrains Mono',monospace;font-size:20px;color:var(--navy);}
  .ss-stat span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
  .ss-alert{display:flex;align-items:center;gap:10px;background:var(--danger-bg);color:#8A2F1F;border:1px solid #EFC3B8;border-radius:8px;padding:9px 13px;margin-bottom:8px;font-size:13px;}
  .ss-alert b{font-family:'JetBrains Mono',monospace;}
  .ss-empty{color:var(--muted);font-size:13px;padding:14px 4px;}
  input[type=text],input[type=number],input[type=date],input[type=time],select,textarea{font-family:'Inter',sans-serif;border:1px solid var(--line);border-radius:6px;padding:7px 9px;font-size:13px;background:#fff;color:var(--ink);width:100%;}
  textarea{resize:vertical;min-height:60px;font-family:'Inter',sans-serif;font-size:13px;}
  label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;}
  .ss-field{margin-bottom:10px;}
  .ss-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .ss-row > *{flex:1;min-width:120px;}
  button.ss-btn{font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.03em;background:var(--navy);color:#fff;border:none;border-radius:7px;padding:9px 18px;font-size:15px;cursor:pointer;}
  button.ss-btn:hover{background:var(--navy-2);}
  button.ss-btn.amber{background:var(--amber);color:#3A2600;}
  button.ss-btn.amber:hover{background:var(--amber-deep);color:#fff;}
  button.ss-btn.violet{background:var(--violet);color:#fff;}
  button.ss-btn.violet:hover{background:#553870;}
  button.ss-btn.teal{background:var(--teal);color:#fff;}
  button.ss-btn.teal:hover{background:#245F58;}
  button.ss-btn.danger{background:var(--danger);color:#fff;}
  button.ss-btn.danger:hover{background:#A83A29;}
  button.ss-btn.ghost{background:transparent;color:var(--navy);border:1px solid var(--line);}
  button.ss-btn.ghost:hover{background:var(--paper);}
  button.ss-btn.small{padding:5px 10px;font-size:12px;border-radius:5px;}
  button.ss-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 6px;}
  button.ss-x:hover{color:var(--danger);}
  table.ss-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.ss-table th{text-align:left;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;font-size:11px;color:var(--muted);letter-spacing:.05em;padding:6px 8px;border-bottom:1px solid var(--line);}
  table.ss-table td{padding:7px 8px;border-bottom:1px solid #EEF1F1;vertical-align:top;}
  .ss-table-wrap{overflow-x:auto;}
  .ss-pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .ss-pill.emp{background:#E4EAF3;color:#2A4A7A;}
  .ss-pill.out{background:#F1E7F5;color:#6A3A82;}
  .ss-badge{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;border:2px solid var(--navy);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;color:var(--navy);flex-shrink:0;}
  .ss-badge.warn{border-color:var(--danger);color:var(--danger);}
  .ss-cand{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px dashed var(--line);}
  .ss-cand:last-child{border-bottom:none;}
  .ss-cand .name{font-weight:600;flex:1;}
  .ss-cand .meta{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
  .ss-bar{height:6px;border-radius:3px;background:#EDEFEF;overflow:hidden;width:70px;flex-shrink:0;}
  .ss-bar i{display:block;height:100%;background:var(--ok);}
  .ss-bar i.warn{background:var(--danger);}
  .ss-shortage{background:#FCF3E4;border:1px solid #EFD8A8;border-radius:8px;padding:10px 13px;font-size:13px;color:#7A5613;margin-top:8px;}
  .ss-cal-toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
  .ss-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .ss-cal-dow{font-size:11px;text-align:center;color:var(--muted);text-transform:uppercase;font-weight:600;padding-bottom:4px;}
  .ss-cal-cell{min-height:82px;border:1px solid var(--line);border-radius:6px;padding:4px;font-size:11px;background:#fff;cursor:pointer;}
  .ss-cal-cell:hover{border-color:var(--amber);}
  .ss-cal-cell.today{border-color:var(--amber);border-width:2px;}
  .ss-cal-cell .d{font-family:'JetBrains Mono',monospace;color:var(--muted);margin-bottom:3px;}
  .ss-cal-item{border-radius:4px;padding:1px 5px;margin-bottom:2px;font-size:10.5px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ss-taskchip{display:inline-flex;align-items:center;gap:6px;background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:3px 10px 3px 6px;font-size:12px;margin:2px;}
  .ss-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .ss-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:99;box-shadow:0 4px 14px rgba(0,0,0,.2);}
  .ss-outsource-row{background:var(--violet-bg);border-radius:8px;padding:10px 12px;margin-top:6px;}
  .ss-vendor-tag{display:inline-block;background:var(--violet-bg);color:var(--violet);border-radius:5px;padding:2px 7px;font-size:11px;margin:2px 3px 2px 0;}
  .ss-import-box{background:var(--paper);border:1px dashed var(--line);border-radius:8px;padding:12px 14px;}
  .ss-hint{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.6;}
  .ss-worker-card{border:1px solid var(--line);border-radius:9px;padding:12px 14px;margin-bottom:10px;background:var(--paper);}
  .ss-worker-card .top{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px;}
  .ss-worker-card .top .wname{font-weight:700;font-size:15px;flex:1;min-width:100px;}
  .ss-skillchip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:3px 6px 3px 10px;font-size:12px;margin:2px;}
  .ss-skillchip .lv{background:var(--navy);color:#fff;border-radius:50%;width:19px;height:19px;display:inline-flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;}
  .ss-add-skill-form{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:6px;background:#fff;border:1px dashed var(--line);border-radius:7px;padding:8px;}
  .ss-add-skill-form select,.ss-add-skill-form input{width:auto;min-width:90px;flex:1;}
  .ss-chiptoggle{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);background:#fff;border-radius:20px;padding:4px 12px;font-size:12px;margin:2px;cursor:pointer;user-select:none;}
  .ss-chiptoggle.on{background:var(--navy);color:#fff;border-color:var(--navy);}
  .ss-chat-wrap{display:flex;flex-direction:column;height:520px;}
  .ss-chat-log{flex:1;overflow-y:auto;padding:6px 2px;display:flex;flex-direction:column;gap:10px;}
  .ss-msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:13.5px;line-height:1.6;}
  .ss-msg.user{align-self:flex-end;background:var(--navy);color:#fff;border-bottom-right-radius:3px;}
  .ss-msg.ai{align-self:flex-start;background:var(--paper);border:1px solid var(--line);border-bottom-left-radius:3px;}
  .ss-msg.system{align-self:center;background:transparent;color:var(--muted);font-size:11.5px;}
  .ss-chat-input-row{display:flex;gap:8px;margin-top:10px;}
  .ss-chat-input-row input{flex:1;}
  .ss-chat-input-row textarea{flex:1;resize:none;min-height:38px;max-height:140px;line-height:1.4;}
  .ss-proposal-card{background:#fff;border:1px solid var(--amber);border-radius:10px;padding:12px 14px;align-self:flex-start;max-width:92%;}
  .ss-proposal-card .ptitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--navy);margin-bottom:6px;}
  .ss-typing{align-self:flex-start;color:var(--muted);font-size:12px;padding:4px 8px;}
  .ss-cal-legend{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .ss-cal-legend-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;}
  .ss-cal-add-btn{width:27px;height:27px;border-radius:50%;border:1px dashed var(--line);background:#fff;color:var(--muted);font-size:16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;line-height:1;}
  .ss-cal-add-btn:hover{border-color:var(--amber);color:var(--amber-deep);border-style:solid;}
  .ss-cal-legend-item{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:20px;padding:4px 10px 4px 6px;font-size:12px;cursor:pointer;background:#fff;}
  .ss-cal-legend-item.off{opacity:.35;}
  .ss-modal-overlay{position:fixed;inset:0;background:rgba(20,30,40,0.55);display:flex;align-items:flex-start;justify-content:center;padding:30px 14px;overflow-y:auto;z-index:200;}
  .ss-modal{background:#fff;border-radius:12px;max-width:540px;width:100%;padding:20px 22px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
  .ss-modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .ss-modal-head h3{margin:0;font-size:19px;font-family:'Barlow Condensed',sans-serif;}
  .ss-modal-section{padding:10px 0;border-bottom:1px dashed var(--line);}
  .ss-modal-section:last-child{border-bottom:none;}
  .ss-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;}
  .ss-switch{width:40px;height:22px;border-radius:20px;background:#DADFE1;position:relative;cursor:pointer;flex-shrink:0;}
  .ss-switch.on{background:var(--ok);}
  .ss-switch .knob{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .15s;}
  .ss-switch.on .knob{left:20px;}
  .ss-modal-actions{display:flex;justify-content:space-between;margin-top:14px;gap:8px;}
  .ss-color-swatch{width:22px;height:22px;border-radius:50%;display:inline-block;cursor:pointer;border:2px solid transparent;margin:2px;}
  .ss-color-swatch.on{border-color:var(--ink);}
  details.ss-details summary{cursor:pointer;font-size:12.5px;color:var(--navy);font-weight:600;padding:6px 0;}
  .ss-link-btn{display:inline-flex;align-items:center;gap:5px;background:var(--teal-bg);color:var(--teal);border:1px solid #BFE0DB;border-radius:6px;padding:6px 10px;font-size:12.5px;text-decoration:none;cursor:pointer;}
  .ss-daylist-item{display:flex;align-items:center;gap:10px;padding:10px 6px;border-bottom:1px dashed var(--line);cursor:pointer;}
  .ss-daylist-item:last-child{border-bottom:none;}
  .ss-daylist-item:hover{background:var(--paper);}
  .ss-image-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
  .ss-image-thumb{position:relative;width:84px;height:84px;border-radius:8px;overflow:hidden;border:1px solid var(--line);background:var(--paper);flex-shrink:0;}
  .ss-image-thumb img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;}
  .ss-image-thumb .ss-x{position:absolute;top:2px;right:2px;background:rgba(20,30,40,.6);color:#fff;border-radius:50%;width:20px;height:20px;padding:0;line-height:20px;font-size:13px;}
  .ss-image-thumb .ss-x:hover{color:#fff;background:var(--danger);}
  .ss-image-loading{display:flex;align-items:center;justify-content:center;height:100%;font-size:10px;color:var(--muted);text-align:center;}
  .ss-daylist-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px;}
  .ss-daylist-nav button{background:none;border:none;color:var(--navy);font-size:22px;cursor:pointer;padding:4px 10px;line-height:1;}
  .ss-daylist-nav button:hover{color:var(--amber-deep);}
  .ss-daylist-swipearea{touch-action:pan-y;}
  .ss-detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:16px;}
  .ss-detail-back{background:none;border:none;color:var(--navy);font-size:22px;cursor:pointer;padding:2px 6px;flex-shrink:0;}
  .ss-detail-menu-btn{background:none;border:none;color:var(--navy);font-size:22px;cursor:pointer;padding:2px 10px;flex-shrink:0;position:relative;}
  .ss-detail-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;line-height:1.35;margin-bottom:14px;}
  .ss-detail-datebox{display:flex;align-items:baseline;gap:14px;margin-bottom:18px;flex-wrap:wrap;}
  .ss-detail-datebox .dt{font-family:'JetBrains Mono',monospace;}
  .ss-detail-datebox .dt b{font-size:26px;display:block;}
  .ss-detail-datebox .dt span{font-size:13px;color:var(--muted);}
  .ss-detail-arrow{color:var(--muted);font-size:20px;}
  .ss-detail-row{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px dashed var(--line);}
  .ss-detail-row:last-child{border-bottom:none;}
  .ss-detail-row .ic{font-size:17px;flex-shrink:0;width:22px;text-align:center;}
  .ss-detail-row .body{flex:1;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;}
  .ss-detail-menu{position:absolute;top:32px;right:0;background:#fff;border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.22);min-width:170px;z-index:20;overflow:hidden;text-align:left;}
  .ss-detail-menu button{display:block;width:100%;text-align:left;background:none;border:none;padding:12px 16px;font-size:14px;color:var(--ink);cursor:pointer;font-family:'Inter',sans-serif;}
  .ss-detail-menu button:hover{background:var(--paper);}
  .ss-detail-menu button.danger{color:var(--danger);}
  .ss-detail-menu hr{border:none;border-top:1px solid var(--line);margin:0;}
  @media(max-width:640px){
    #ss-root{font-size:15px;}
    label{font-size:12px;}
    .ss-main{padding:14px 10px 60px 10px;}
    .ss-header{padding:16px 14px 0 14px;}
    .ss-title{font-size:21px;}
    .ss-card{padding:14px 12px;margin-bottom:12px;}
    .ss-tab{padding:9px 12px;font-size:13px;}
    .ss-grid.cols-3,.ss-grid.cols-4{grid-template-columns:1fr 1fr;gap:8px;}
    .ss-stat{padding:9px 10px;}
    .ss-stat b{font-size:17px;}
    input[type=text],input[type=number],input[type=date],input[type=time],input[type=url],select,textarea{font-size:16px;padding:9px 10px;}
    .ss-row{gap:8px;}
    .ss-row > *{min-width:100%;}
    table.ss-table{font-size:13px;}
    table.ss-table th,table.ss-table td{padding:8px 8px;}
    .ss-taskchip,.ss-skillchip,.ss-chiptoggle{font-size:12.5px;padding:5px 12px;}
    button.ss-btn.small{padding:7px 13px;font-size:12.5px;}
    .ss-daylist-item{padding:14px 2px;gap:12px;}
    .ss-daylist-item .meta,.ss-daylist-item .mono{font-size:12.5px;}
    .ss-cal-grid{grid-template-columns:repeat(7,minmax(0,1fr));gap:1px;}
    .ss-cal-dow{font-size:10.5px;padding-bottom:4px;}
    .ss-cal-cell{min-height:72px;padding:4px 2px;font-size:12px;border:none;border-radius:0;background:transparent;}
    .ss-cal-cell:hover{border:none;}
    .ss-cal-cell.today{border:none;background:#FCF3E0;border-radius:6px;}
    .ss-cal-cell .d{font-size:12px;margin-bottom:2px;}
    .ss-cal-item{font-size:10.5px;padding:2.5px 4px;margin-bottom:2px;border-radius:4px;line-height:1.4;}
    .ss-cal-toolbar{gap:6px;}
    .ss-modal-overlay{padding:0;align-items:flex-end;}
    .ss-modal{max-width:100%;width:100%;border-radius:14px 14px 0 0;max-height:92vh;overflow-y:auto;padding:16px 14px 20px;}
    #daylist-overlay{align-items:stretch;}
    #daylist-overlay .ss-modal{height:100vh;max-height:100vh;border-radius:0;}
    .ss-chat-wrap{height:72vh;}
    .ss-chat-input-row{flex-wrap:wrap;}
    .ss-chat-input-row textarea{flex:1 1 100%;}
    .ss-chat-input-row button{flex:1;}
    .ss-msg{max-width:92%;}
    .ss-worker-card .top{gap:6px;}
    .ss-worker-card .top select,.ss-worker-card .top input{width:auto;flex:1;min-width:50px;}
  }
</style>
<div id="ss-root">
  <div class="ss-header">
    <div class="ss-header-top">
      <div>
        <h1 class="ss-title">現場<span>スケジュール</span>管理</h1>
      </div>
    </div>
    <div class="ss-tabs" id="ss-tabs"></div>
  </div>
  <div class="ss-main" id="ss-main"></div>
</div>

<script>
(function(){
  const COLORS = ['#3E6E9E','#B87A1E','#5E8E5A','#8A5AA0','#C05C5C','#3A9E92','#9E7A3A'];
  const CAL_COLORS = ['#3E6E9E','#B87A1E','#5E8E5A','#8A5AA0','#C05C5C','#2E7D74','#9E7A3A','#4A5568'];
  const EVENT_COLORS = ['#3E6E9E','#4FA3C7','#2E7D74','#5E8E5A','#9E7A3A','#B87A1E','#C05C5C','#C77DB0','#8A5AA0','#4A5568'];
  let state = { equipmentTypes: [], workTypes: [], workers: [], vendors: [], projects: [], templates: [], calendars: [] };
  let tab = 'calendar';
  let calMonth = new Date(); calMonth.setDate(1);

  async function apiGet(key){

    const j = await r.json();
    return j.value;
  }
  async function apiSet(key, value){

      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({key, value})
    });
    if(!r.ok) throw new Error('storage set failed');
  }

      state.workTypes = ['新規設置','入替え','廃棄','修理'].map(n=>({id:uid('wt'),name:n}));

      state.calendars = [

  // ---------- scoring engine ----------
  function isAvailable(workerId, start, end, excludeProjectId){
    return !state.projects.some(p => p.id!==excludeProjectId && (p.assignedWorkerIds||[]).includes(workerId) && overlap(p.start,p.end,start,end));
  }
  function skillFor(w, equipmentTypeId, workTypeId){
    const entries = (w.skills||[]).filter(s=>s.equipmentTypeId===equipmentTypeId && s.workTypeId===workTypeId);
    if(entries.length===0) return 0;
    return Math.max(...entries.map(e=>e.level));
  }
  function suggest({equipmentTypeId, workTypeId, requiredLevel, start, end, requiredCount}, excludeProjectId, excludeWorkerIds){
    excludeWorkerIds = excludeWorkerIds || [];
    const candidates = state.workers.filter(w=>!excludeWorkerIds.includes(w.id)).map(w=>{
      const skill = skillFor(w, equipmentTypeId, workTypeId);
      const available = isAvailable(w.id, start, end, excludeProjectId||null);
      const cap = w.maxOvertimeHours || 45;
      const overtimeRatio = Math.min(1.5, (w.overtimeHours||0)/cap);
      const qualified = skill >= requiredLevel;
      const score = skill*20 - overtimeRatio*30;
      return {worker:w, skill, available, qualified, overtimeRatio, score};
    });
    const usable = candidates.filter(c=>c.available).sort((a,b)=> (b.qualified-a.qualified) || (b.score-a.score));
    const picked = usable.slice(0, requiredCount);
    const shortage = Math.max(0, requiredCount - picked.length);
    return {picked, shortage, candidates};
  }
  function vendorsForCombo(equipmentTypeId, workTypeId){
    return state.vendors.filter(v => (v.equipmentTypeIds||[]).includes(equipmentTypeId) && (v.workTypeIds||[]).includes(workTypeId));
  }
  function findTemplate(eq, wt){ return state.templates.find(t=>t.equipmentTypeId===eq && t.workTypeId===wt); }
  function addDays(dateStr, n){ const d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n); return fmtDate(d); }
  function templateLabel(t){ return `${eqName(t.equipmentTypeId)}／${wtName(t.workTypeId)}`; }
  async function resolveNamedWorkers(names, equipmentTypeId, workTypeId){
    if(!names || names.length===0) return [];
    let created = false;
    const resolved = names.map(nameRaw=>{
      const name = String(nameRaw).trim();
      if(!name) return null;
      let w = state.workers.find(w=>w.name===name);
      if(!w){
        w = {id:uid('w'), name, type:'社員', skills: equipmentTypeId&&workTypeId ? [{id:uid('sk'), equipmentTypeId, workTypeId, level:3}] : [], overtimeHours:0, maxOvertimeHours:45};
        state.workers.push(w);
        created = true;
      }
      return w;
    }).filter(Boolean);
    if(created) await saveMaster();
    return resolved;
  }

  // ---------- import ----------
  function parseDateLoose(str){
    if(!str) return null;
    str = str.trim();
    let m = str.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
    if(!m) return null;
    return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  }
  function parseAmount(str){ if(!str) return 0; const v=parseInt(String(str).replace(/[¥,\s]/g,''),10); return isNaN(v)?0:v; }
  function parseImportText(text){ return text.split(/\r?\n/).filter(l=>l.trim().length>0).map(l => l.includes('\t') ? l.split('\t') : l.split(',')); }
  async function runImport(text){
    let rows = parseImportText(text);
    if(rows.length && /施行日|物件名|日付/.test(rows[0].join(''))) rows = rows.slice(1);
    let count = 0;
    rows.forEach(cols=>{
      const [dateRaw, salesRep, name, address, workDetail, budgetRaw, actualRaw] = cols;
      if(!name || !name.trim()) return;
      const d = parseDateLoose(dateRaw) || todayStr();
      state.projects.push({
        id: uid('p'), name: name.trim(), address:(address||'').trim(), salesRep:(salesRep||'').trim(),
        workDetail:(workDetail||'').trim(), equipmentTypeId:null, workTypeId:null,
        requiredLevel:1, start:d, end:d, allDay:true, requiredCount:1, assignedWorkerIds:[], outsourceCount:0,
        vendorEntries:[], budgetAmount:parseAmount(budgetRaw), actualAmount:parseAmount(actualRaw),
        calendarId: mainCalendarId(), createdAt:new Date().toISOString(),
      });
      count++;
    });
    await saveProjects();
    toast(`${count}件を取り込みました`);
    renderCalendar();
  }

    $l.querySelectorAll('[data-f]').forEach(inp=>inp.onchange=async()=>{

      await saveMaster(); renderWorkerList();
    });
    $l.querySelectorAll('[data-del-skill]').forEach(b=>b.onclick=async()=>{
      const [wid,sid] = b.dataset.delSkill.split('|');

  // ---------- CALENDAR (TimeTree風・手動編集可) ----------
  function renderCalendar(){
    $main.innerHTML = `
      <div class="ss-card">
        <div class="ss-cal-toolbar">
          <div class="ss-cal-legend-row">
            <div class="ss-cal-legend" id="cal-legend"></div>
            <button type="button" class="ss-cal-add-btn" id="cal-add-calendar" title="カレンダーを追加">＋</button>
          </div>
        </div>
        <div class="ss-cal-toolbar">
          <span id="cal-label" class="disp" style="font-size:20px;"></span>
          <span>
            <button class="ss-btn ghost small" id="cal-prev">◀ 前月</button>
            <button class="ss-btn ghost small" id="cal-next">翌月 ▶</button>
            <button class="ss-btn amber small" id="cal-add-event">＋ 予定を追加</button>
          </span>
        </div>
        <div class="ss-cal-grid" id="cal-grid"></div>
      </div>
      ${eventModal ? renderEventModalHtml() : copyModal ? renderCopyModalHtml() : detailModal ? renderDetailModalHtml() : (dayListModal ? renderDayListModalHtml() : '')}
    `;
    const $legend = document.getElementById('cal-legend');
    $legend.innerHTML = state.calendars.map(c=>`
      <span class="ss-cal-legend-item ${calVisible[c.id]===false?'off':''}" data-toggle-cal="${c.id}">
        <span class="ss-dot" style="background:${c.color}"></span>${c.name}
      </span>
    `).join('');
    $legend.querySelectorAll('[data-toggle-cal]').forEach(el=>el.onclick=()=>{
      const id = el.dataset.toggleCal;
      calVisible[id] = !(calVisible[id]!==false);
      renderCalendar();
    });
    document.getElementById('cal-add-calendar').onclick = async()=>{
      const name = prompt('カレンダー名を入力してください（例：協力業者、車両 など）');
      if(!name) return;
      const color = CAL_COLORS[state.calendars.length % CAL_COLORS.length];
      state.calendars.push({id:uid('cal'), name, color});
      await saveMaster();
      renderCalendar();
    };
    document.getElementById('cal-prev').onclick=()=>{ calMonth.setMonth(calMonth.getMonth()-1); renderCalendar(); };
    document.getElementById('cal-next').onclick=()=>{ calMonth.setMonth(calMonth.getMonth()+1); renderCalendar(); };
    document.getElementById('cal-add-event').onclick=()=>{ openEventModal('new', todayStr()); };
    document.getElementById('cal-label').textContent = `${calMonth.getFullYear()}年 ${calMonth.getMonth()+1}月`;

    const $g = document.getElementById('cal-grid');
    const dows = ['日','月','火','水','木','金','土'];
    let html = dows.map(d=>`<div class="ss-cal-dow">${d}</div>`).join('');
    const first = new Date(calMonth.getFullYear(), calMonth.getMonth(), 1);
    const startOffset = first.getDay();
    const daysInMonth = new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 0).getDate();
    const today = todayStr();
    for(let i=0;i<startOffset;i++) html += `<div></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const dateStr = fmtDate(new Date(calMonth.getFullYear(), calMonth.getMonth(), d));
      const items = state.projects.filter(p => p.start<=dateStr && dateStr<=p.end && calVisible[p.calendarId]!==false);
      html += `<div class="ss-cal-cell ${dateStr===today?'today':''}" data-day="${dateStr}"><div class="d">${d}</div>
        ${items.map(p=>`<div class="ss-cal-item" style="background:${eventColor(p)}" data-open-event="${p.id}" title="${p.name}">${p.startTime?(p.startTime+' '):''}${p.name}${p.url?' 🔗':''}</div>`).join('')}
      </div>`;
    }
    $g.innerHTML = html;
    $g.querySelectorAll('.ss-cal-item[data-open-event]').forEach(el=>el.onclick=(e)=>{ e.stopPropagation(); openDetail(el.dataset.openEvent); });
    $g.querySelectorAll('.ss-cal-cell').forEach(cell=>cell.onclick=()=>{ openDayList(cell.dataset.day); });

    if(eventModal) attachEventModalHandlers();
    else if(copyModal) attachCopyHandlers();
    else if(detailModal) attachDetailHandlers();
    else if(dayListModal) attachDayListHandlers();
  }

  function dayLabel(dateStr){
    const dows = ['日','月','火','水','木','金','土'];
    const d = new Date(dateStr+'T00:00:00');
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${dows[d.getDay()]}）`;
  }
  function openDayList(dateStr){ dayListModal = dateStr; eventModal = null; detailModal = null; renderCalendar(); }
  function closeDayList(){ dayListModal = null; renderCalendar(); }
  function shiftDayList(n){ dayListModal = addDays(dayListModal, n); renderCalendar(); }
  function renderDayListModalHtml(){
    const dateStr = dayListModal;
    const items = state.projects.filter(p => p.start<=dateStr && dateStr<=p.end && calVisible[p.calendarId]!==false)
      .sort((a,b)=> (a.startTime||'')<(b.startTime||'') ? -1 : 1);
    return `
    <div class="ss-modal-overlay" id="daylist-overlay">
      <div class="ss-modal">
        <div class="ss-modal-head">
          <button class="ss-x" id="daylist-close" style="font-size:20px;">×</button>
        </div>
        <div class="ss-daylist-nav">
          <button type="button" id="daylist-prev">‹</button>
          <h3 style="margin:0;">${dayLabel(dateStr)}</h3>
          <button type="button" id="daylist-next">›</button>
        </div>
        <button class="ss-btn amber small" id="daylist-add" style="margin:10px 0;">＋ この日に予定を追加</button>
        <div id="daylist-swipearea" class="ss-daylist-swipearea">
        ${items.length===0 ? `<div class="ss-empty">この日の予定はありません。</div>` :
          items.map(p=>`
            <div class="ss-daylist-item" data-open-event="${p.id}">
              <span class="ss-dot" style="background:${eventColor(p)}"></span>
              <div style="flex:1;">
                <b>${p.startTime?(p.startTime+' '):''}${p.name}</b>
                <div class="mono meta" style="color:var(--muted);font-size:11px;">${calName(p.calendarId)}${comboLabel(p)?(' / '+comboLabel(p)):''}${p.address?(' / '+p.address):''}${p.url?' / 🔗':''}</div>
                <div class="meta" style="font-size:12px;color:var(--muted);">${(p.assignedWorkerIds||[]).map(id=>worker(id)?worker(id).name:'').filter(Boolean).join('、') || '未割当'}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>`;
  }
  function attachDayListHandlers(){
    document.getElementById('daylist-overlay').addEventListener('click', e=>{ if(e.target.id==='daylist-overlay') closeDayList(); });
    document.getElementById('daylist-close').onclick = closeDayList;
    document.getElementById('daylist-prev').onclick = ()=>shiftDayList(-1);
    document.getElementById('daylist-next').onclick = ()=>shiftDayList(1);
    document.getElementById('daylist-add').onclick = ()=>{ openEventModal('new', dayListModal); };
    document.querySelectorAll('[data-open-event]').forEach(el=>el.onclick=()=>{ openDetail(el.dataset.openEvent); });
    const swipeArea = document.getElementById('daylist-swipearea');
    let touchStartX = null, touchStartY = null;
    swipeArea.addEventListener('touchstart', e=>{ touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, {passive:true});
    swipeArea.addEventListener('touchend', e=>{
      if(touchStartX===null) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){ shiftDayList(dx < 0 ? 1 : -1); }
      touchStartX = null; touchStartY = null;
    }, {passive:true});
  }

  function openDetail(projectId){
    detailModal = projectId;

    copyModal = null;
    renderCalendar();
    fetchDetailImages();

            <button type="button" class="ss-detail-menu-btn" id="detail-menu-btn">⋯</button>
            ${detailMenuOpen ? `
            <div class="ss-detail-menu" id="detail-menu">

              <button type="button" id="detail-copy">コピー</button>

        <div class="ss-detail-row"><span class="ic">👥</span><div class="body">${allParticipants.length ? allParticipants.join('、') : '未割当'}</div></div>
        ${p.workDetail ? `<div class="ss-detail-row"><span class="ic">📝</span><div class="body">${p.workDetail}</div></div>` : ''}
        ${p.address ? `<div class="ss-detail-row"><span class="ic">📍</span><div class="body">${p.address}</div></div>` : ''}
        <div class="ss-detail-row"><span class="ic">📅</span><div class="body">${calName(p.calendarId)}${comboLabel(p)?(' ／ '+comboLabel(p)):''}</div></div>
        ${p.url ? `<div class="ss-detail-row"><span class="ic">🔗</span><div class="body"><a href="${p.url}" target="_blank" rel="noopener">${p.url}</a></div></div>` : ''}
        ${(p.images&&p.images.length) ? `<div class="ss-detail-row"><span class="ic">📷</span><div class="body"><div class="ss-image-grid" id="detail-images"></div></div></div>` : ''}
      </div>
    </div>`;

  function renderDetailImages(){
    const $imgs = document.getElementById('detail-images');
    if(!$imgs || !detailModal) return;
    const p = state.projects.find(p=>p.id===detailModal);
    if(!p) return;
    $imgs.innerHTML = (p.images||[]).map(im=>`
      <div class="ss-image-thumb">
        ${imageCache[im.key] ? `<img src="${imageCache[im.key]}" data-view-img="1">` : `<div class="ss-image-loading">読込中…</div>`}
      </div>
    `).join('');
    $imgs.querySelectorAll('[data-view-img]').forEach(img=>img.onclick=()=>window.open(img.src, '_blank'));
  }
  async function fetchDetailImages(){
    const p = state.projects.find(p=>p.id===detailModal);
    if(!p) return;
    for(const im of (p.images||[])){
      if(imageCache[im.key] || !im.key) continue;
      try{ await fetchImageDataUrl(im.key); if(detailModal===p.id) renderDetailImages(); }catch(e){ /* ignore */ }
    }
  }
  function attachDetailHandlers(){
    document.getElementById('detail-overlay').addEventListener('click', e=>{
      if(e.target.id==='detail-overlay'){ closeDetail(); return; }
      if(detailMenuOpen && !e.target.closest('.ss-detail-menu') && !e.target.closest('.ss-detail-menu-btn')){ detailMenuOpen = false; renderCalendar(); }
    });
    document.getElementById('detail-close').onclick = closeDetail;
    document.getElementById('detail-menu-btn').onclick = (e)=>{ e.stopPropagation(); detailMenuOpen = !detailMenuOpen; renderCalendar(); };
    const editBtn = document.getElementById('detail-edit');
    if(editBtn) editBtn.onclick = ()=>{ const id = detailModal; openEventModal('edit', null, id); };
    const copyBtn = document.getElementById('detail-copy');
    if(copyBtn) copyBtn.onclick = ()=>openCopyModal(detailModal);
    const delBtn = document.getElementById('detail-delete');
    if(delBtn) delBtn.onclick = async()=>{
      if(!confirm('この予定を削除しますか？')) return;
      state.projects = state.projects.filter(p=>p.id!==detailModal);
      await saveProjects();
      closeDetail();
      toast('削除しました');
    };
    renderDetailImages();

  function openCopyModal(projectId){
    const p = state.projects.find(p=>p.id===projectId);
    if(!p) return;
    copyModal = { projectId, date: p.start, calendarId: p.calendarId };
    detailMenuOpen = false;
    renderCalendar();
  }
  function closeCopyModal(){ copyModal = null; renderCalendar(); }
  function renderCopyModalHtml(){
    const p = state.projects.find(p=>p.id===copyModal.projectId);
    if(!p) return '';
    return `
    <div class="ss-modal-overlay" id="copy-overlay">
      <div class="ss-modal">
        <div class="ss-modal-head">
          <h3>予定をコピー</h3>
          <button class="ss-x" id="copy-close" style="font-size:20px;">×</button>

        <div class="ss-field"><label>コピー先の日付</label><input type="date" id="copy-date" value="${copyModal.date}"></div>
        <div class="ss-field"><label>コピー先のカレンダー</label>
          <select id="copy-calendar">${state.calendars.map(c=>`<option value="${c.id}" ${copyModal.calendarId===c.id?'selected':''}>${c.name}</option>`).join('')}</select>

          <div></div>

      </div>

  function attachCopyHandlers(){
    document.getElementById('copy-overlay').addEventListener('click', e=>{ if(e.target.id==='copy-overlay') closeCopyModal(); });
    document.getElementById('copy-close').onclick = closeCopyModal;
    document.getElementById('copy-cancel').onclick = closeCopyModal;
    document.getElementById('copy-confirm').onclick = async()=>{
      const p = state.projects.find(p=>p.id===copyModal.projectId);
      if(!p) return;
      const newDate = document.getElementById('copy-date').value || p.start;
      const newCalendarId = document.getElementById('copy-calendar').value;
      const durationDays = Math.round((new Date(p.end+'T00:00:00') - new Date(p.start+'T00:00:00')) / 86400000);
      const clone = JSON.parse(JSON.stringify(p));
      delete clone.id;
      clone.start = newDate;
      clone.end = addDays(newDate, durationDays);
      clone.calendarId = newCalendarId;
      clone.createdAt = new Date().toISOString();
      state.projects.push(Object.assign({id:uid('p')}, clone));
      await saveProjects();
      copyModal = null;
      detailModal = null;
      toast('コピーしました');
      renderCalendar();
    };
  }

  function openEventModal(mode, dateStr, projectId){
    dayListModal = null;
    detailModal = null;
    detailMenuOpen = false;
    copyModal = null;
    if(mode==='new'){
      eventModal = { mode:'new', data:{
        name:'', address:'', salesRep:'', workDetail:'', equipmentTypeId:'', workTypeId:'',
        requiredLevel:3, start:dateStr, end:dateStr, allDay:true, startTime:'', endTime:'', url:'', requiredCount:1,
        assignedWorkerIds:[], outsourceCount:0, vendorEntries:[], budgetAmount:0, actualAmount:0,
        calendarId: mainCalendarId(), images:[], color:null,
      }, originalImageKeys:[] };
    } else {
      const p = state.projects.find(p=>p.id===projectId);
      eventModal = { mode:'edit', id:projectId, data: JSON.parse(JSON.stringify(p)), originalImageKeys: (p.images||[]).map(im=>im.key) };
      eventModal.data.images = eventModal.data.images || [];
    }
    renderCalendar();
    fetchEventImages();
  }
  async function fetchImageDataUrl(key){
    if(imageCache[key]) return imageCache[key];
    const val = await apiGet(key);
    if(val && val.dataUrl){ imageCache[key] = val.dataUrl; return val.dataUrl; }
    return null;
  }
  async function fetchEventImages(){
    if(!eventModal) return;
    const list = eventModal.data.images||[];
    for(const im of list){
      if(im.dataUrl || !im.key) continue;
      try{
        const dataUrl = await fetchImageDataUrl(im.key);
        if(dataUrl && eventModal && eventModal.data.images.includes(im)){ im.dataUrl = dataUrl; renderEvImages(); }
      }catch(e){ /* ignore, thumbnail stays as loading state */ }
    }
  }
  function closeEventModal(){ eventModal=null; renderCalendar(); }

  function renderEventModalHtml(){
    const d = eventModal.data;
    return `
    <div class="ss-modal-overlay" id="ev-overlay">

  function resizeImageToDataUrl(file, maxDim, quality){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = ()=>{
        const img = new Image();
        img.onload = ()=>{
          let {width, height} = img;
          if(width>maxDim || height>maxDim){
            const ratio = Math.min(maxDim/width, maxDim/height);
            width = Math.round(width*ratio); height = Math.round(height*ratio);
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function sendChatMessage(){
    const $input = document.getElementById('chat-input');
    const text = $input.value.trim();
    if(!text || chatBusy) return;
    $input.value = '';
    chatMessages.push({role:'user', text});
    chatApiHistory.push({role:'user', content:text});
    chatBusy = true;
    renderChatLog();
    try{
      const response = await fetch('/.netlify/functions/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ system: buildChatSystemPrompt(), messages: chatApiHistory })
      });
      if(!response.ok) throw new Error('chat function error');
      const data = await response.json();
      const raw = (data.content||[]).map(c=>c.text||'').join('');
      chatApiHistory.push({role:'assistant', content:raw});
      let parsed;
      try{ parsed = JSON.parse(raw.replace(/```json|```/g,'').trim()); }
      catch(e){ parsed = {status:'ask', reply: raw || 'すみません、うまく聞き取れませんでした。もう一度お願いします。', fields:{}}; }
      chatFields = Object.assign({}, chatFields, parsed.fields||{});
      chatBusy = false;
      chatMessages.push({role:'ai', text: parsed.reply || '...'});
      if(parsed.status === 'ready'){
        if(chatFields.newTemplateDuration && chatFields.newTemplateUnit && chatFields.newTemplateCount && chatFields.equipmentTypeId && chatFields.workTypeId){
          const existing = findTemplate(chatFields.equipmentTypeId, chatFields.workTypeId);
          if(!existing){
            state.templates.push({id:uid('tp'), equipmentTypeId:chatFields.equipmentTypeId, workTypeId:chatFields.workTypeId, durationValue:chatFields.newTemplateDuration, durationUnit:chatFields.newTemplateUnit, requiredCount:chatFields.newTemplateCount});
            await saveMaster();
            chatMessages.push({role:'system', text:`🗂 新しいテンプレートを登録しました：${eqName(chatFields.equipmentTypeId)}／${wtName(chatFields.workTypeId)}（${chatFields.newTemplateDuration}${chatFields.newTemplateUnit}・${chatFields.newTemplateCount}人）`});
          }
        }
        let namedWorkers = [];
        if(chatFields.newWorkerNames && chatFields.newWorkerNames.length){
          const beforeNames = state.workers.map(w=>w.name);
          namedWorkers = await resolveNamedWorkers(chatFields.newWorkerNames, chatFields.equipmentTypeId, chatFields.workTypeId);
          const addedNames = namedWorkers.filter(w=>!beforeNames.includes(w.name)).map(w=>w.name);
          if(addedNames.length) chatMessages.push({role:'system', text:`👷 新しい人員を登録しました：${addedNames.join('、')}`});
        }
        const proposal = computeChatProposal(chatFields, namedWorkers);
        chatPendingProposal = proposal;
        chatMessages.push({role:'proposal', data: proposal});
      }
      renderChatLog();
    }catch(err){
      chatBusy = false;
      chatMessages.push({role:'system', text:'⚠ AIとの通信でエラーが発生しました。もう一度お試しください。'});
      renderChatLog();
    }
  }
  function computeChatProposal(fields, namedWorkers){
    namedWorkers = namedWorkers || [];
    const tmpl = findTemplate(fields.equipmentTypeId, fields.workTypeId);
    const requiredCount = fields.requiredCount || (tmpl ? tmpl.requiredCount : Math.max(2, namedWorkers.length));
    const start = fields.date || todayStr();
    let end = start;
    if(tmpl && tmpl.durationUnit==='日'){ end = addDays(start, Math.max(0, Math.ceil(tmpl.durationValue)-1)); }

    let picked = namedWorkers.map(w=>({worker:w, skill: skillFor(w, fields.equipmentTypeId, fields.workTypeId)}));
    let shortage = 0;
    if(picked.length < requiredCount){
      const result = suggest({equipmentTypeId:fields.equipmentTypeId, workTypeId:fields.workTypeId, requiredLevel:3, start, end, requiredCount: requiredCount - picked.length}, null, picked.map(c=>c.worker.id));
      picked = picked.concat(result.picked);
      shortage = result.shortage;
    }
    const vendorCands = vendorsForCombo(fields.equipmentTypeId, fields.workTypeId);
    const warnings = [];
    if(fields.refrigerant) warnings.push('冷媒工事の言及あり：冷媒資格者を含めて配置してください。');
    if(fields.removal) warnings.push('搬出・撤去あり：車両・台車の手配を忘れずに。');
    if(fields.note) warnings.push(fields.note);
    if(shortage>0) warnings.push(`内部人員だけでは${shortage}名不足しています。外注の手配を検討してください。`);
    return {
      name: fields.name || '(名称未設定)', address: fields.address||'', equipmentTypeId: fields.equipmentTypeId,
      workTypeId: fields.workTypeId, start, end, requiredCount,
      picked: picked.map(c=>({id:c.worker.id, name:c.worker.name, skill:c.skill, overtimeHours:c.worker.overtimeHours||0})),
      shortage, vendorCands: vendorCands.map(v=>v.name), warnings,
      estimatedHours: tmpl ? `${tmpl.durationValue}${tmpl.durationUnit}` : '(テンプレート未登録)',
      calendarId: mainCalendarId(),
    };
  }
  function renderProposalCardHtml(p){
    return `<div class="ss-proposal-card">
      <div class="ptitle">📋 提案：${p.name}</div>
      <div style="font-size:12.5px;color:var(--muted);margin-bottom:8px;" class="mono">${p.start}${p.start!==p.end?(' 〜 '+p.end):''} ／ ${eqName(p.equipmentTypeId)}／${wtName(p.workTypeId)} ／ 想定時間:${p.estimatedHours}</div>
      <div class="ss-subhead" style="margin:6px 0 4px;">推奨人員（内部）</div>
      ${p.picked.length===0 ? '<div class="ss-empty" style="padding:2px;">候補なし</div>' :
        p.picked.map(w=>`<span class="ss-skillchip"><span class="lv">${w.skill}</span>${w.name}<span style="color:var(--muted);font-size:10px;margin-left:3px;">(残業${w.overtimeHours}h)</span></span>`).join('')}
      ${p.shortage>0 ? `<div class="ss-shortage" style="margin-top:8px;">⚠ ${p.shortage}名不足。${p.vendorCands.length?('外注候補：'+p.vendorCands.join('、')):'対応可能な外注先が未登録です。'}</div>` : ''}
      ${p.warnings.length ? `<div style="margin-top:8px;">${p.warnings.map(w=>`<div style="font-size:12px;color:var(--amber-deep);">⚠ ${w}</div>`).join('')}</div>` : ''}
      <button class="ss-btn amber small" id="chat-confirm-proposal" style="margin-top:10px;">この内容でカレンダー登録する</button>
    </div>`;
  }
  async function confirmChatProposal(p){
    state.projects.push({
      id: uid('p'), name: p.name, address: p.address, salesRep: '', workDetail: p.warnings.join('／'),
      equipmentTypeId: p.equipmentTypeId, workTypeId: p.workTypeId, requiredLevel: 3, start: p.start, end: p.end,
      allDay:true, requiredCount: p.requiredCount, assignedWorkerIds: p.picked.map(w=>w.id), outsourceCount: p.shortage,
      vendorEntries: [], budgetAmount: 0, actualAmount: 0, calendarId: p.calendarId, createdAt: new Date().toISOString(),
    });
    await saveProjects();
    chatMessages.push({role:'system', text:'✅ カレンダーに登録しました。'});
    chatPendingProposal = null;
    toast('案件をカレンダーに登録しました');
    tab = 'calendar';
    render();
  }
})();
</script>
